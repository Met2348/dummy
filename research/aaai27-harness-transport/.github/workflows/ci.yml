name: TRACE-H portability CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install "uv>=0.7,<1"
      - name: Sync test environment
        run: uv sync --project experiments --frozen --group dev
      - name: Run unit tests
        run: uv run --project experiments pytest
      - name: Validate GitHub-to-HiPerGator release
        run: python deployment/hipergator/validate_release.py
