<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="454" viewBox="0 0 1180 454">
  <rect width="1180" height="454" fill="#ffffff"/>
  <text x="24" y="30" font-size="20" fill="#111827" font-weight="700">TRACE-H local paper-level PK requirement audit</text>
  <text x="24" y="50" font-size="12" fill="#4b5563">Pass means the current local artifact evidence satisfies the explicit local PK goal; warn marks remaining submission-level boundary.</text>
  <rect x="24" y="60" width="104" height="24" rx="4" fill="#d8f3dc"/><text x="76" y="76" font-size="12" text-anchor="middle" fill="#1b5e20" font-weight="700">PASS</text><text x="150" y="76" font-size="13" fill="#1f2933">至少 3 个真实数据源</text><rect x="24" y="94" width="104" height="24" rx="4" fill="#d8f3dc"/><text x="76" y="110" font-size="12" text-anchor="middle" fill="#1b5e20" font-weight="700">PASS</text><text x="150" y="110" font-size="13" fill="#1f2933">每个关键真实数据集至少 6 个 baseline + Ours</text><rect x="24" y="128" width="104" height="24" rx="4" fill="#d8f3dc"/><text x="76" y="144" font-size="12" text-anchor="middle" fill="#1b5e20" font-weight="700">PASS</text><text x="150" y="144" font-size="13" fill="#1f2933">每个关键真实数据集都有两种 metrics</text><rect x="24" y="162" width="104" height="24" rx="4" fill="#d8f3dc"/><text x="76" y="178" font-size="12" text-anchor="middle" fill="#1b5e20" font-weight="700">PASS</text><text x="150" y="178" font-size="13" fill="#1f2933">Ours 在所有 primary metrics 上 rank 1 且唯一</text><rect x="24" y="196" width="104" height="24" rx="4" fill="#d8f3dc"/><text x="76" y="212" font-size="12" text-anchor="middle" fill="#1b5e20" font-weight="700">PASS</text><text x="150" y="212" font-size="13" fill="#1f2933">Ours 相对全部 paper baselines 统计显著</text><rect x="24" y="230" width="104" height="24" rx="4" fill="#d8f3dc"/><text x="76" y="246" font-size="12" text-anchor="middle" fill="#1b5e20" font-weight="700">PASS</text><text x="150" y="246" font-size="13" fill="#1f2933">真实数据集 secondary metrics 也 rank 1</text><rect x="24" y="264" width="104" height="24" rx="4" fill="#d8f3dc"/><text x="76" y="280" font-size="12" text-anchor="middle" fill="#1b5e20" font-weight="700">PASS</text><text x="150" y="280" font-size="13" fill="#1f2933">真实数据集 primary paired tests 均显著</text><rect x="24" y="298" width="104" height="24" rx="4" fill="#d8f3dc"/><text x="76" y="314" font-size="12" text-anchor="middle" fill="#1b5e20" font-weight="700">PASS</text><text x="150" y="314" font-size="13" fill="#1f2933">HarnessBench endpoint 子集达到 30 tasks 且 Ours 全成功</text><rect x="24" y="332" width="104" height="24" rx="4" fill="#d8f3dc"/><text x="76" y="348" font-size="12" text-anchor="middle" fill="#1b5e20" font-weight="700">PASS</text><text x="150" y="348" font-size="13" fill="#1f2933">可视化产物存在</text><rect x="24" y="366" width="104" height="24" rx="4" fill="#d8f3dc"/><text x="76" y="382" font-size="12" text-anchor="middle" fill="#1b5e20" font-weight="700">PASS</text><text x="150" y="382" font-size="13" fill="#1f2933">75% fixed-split audit 仍 rank 1 且显著</text><rect x="24" y="400" width="104" height="24" rx="4" fill="#fff3bf"/><text x="76" y="416" font-size="12" text-anchor="middle" fill="#7a5200" font-weight="700">WARN</text><text x="150" y="416" font-size="13" fill="#1f2933">投稿最终 sealed LLM-agent result 仍未完成</text>
