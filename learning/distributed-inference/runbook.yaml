# distributed-inference 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules distributed-inference
# 文档入口（README §运行验证）：8 个单进程模拟 demo（TP/PP/EP 并行 + disagg + KV 迁移 + routing + DistServe + capstone）。
# 全部无 torch.distributed / 多卡 —— 纯 CPU 单进程模拟，秒级直跑（v0: false，无 argparse）。
# 注：tp_demo/pp_demo/ep_demo/disaggregated_mock/kv_transfer_mock/routing_policies/distserve_original_minimal
#     原缺 __main__（直跑无输出），本轮补了 demo() + __main__ 使其名副其实可跑。
# 测试归 V2（--tests，20 passed）；无 verify_env。
module: distributed-inference
commands:
  - id: tp-demo
    desc: "Tensor Parallel：列/行切分 + all-reduce 通信量"
    cmd: "python learning/distributed-inference/src/tp_demo.py"
    tier: V1
    v0: false
    gpu: false

  - id: pp-demo
    desc: "Pipeline Parallel：微批调度 + bubble 占比"
    cmd: "python learning/distributed-inference/src/pp_demo.py"
    tier: V1
    v0: false
    gpu: false

  - id: ep-demo
    desc: "Expert Parallel (MoE)：expert→GPU 放置 + all-to-all dispatch 时间"
    cmd: "python learning/distributed-inference/src/ep_demo.py"
    tier: V1
    v0: false
    gpu: false

  - id: disaggregated-mock
    desc: "Prefill/Decode 分离：interference 模型推出吞吐增益随 prompt 长度变化"
    cmd: "python learning/distributed-inference/src/disaggregated_mock.py"
    tier: V1
    v0: false
    gpu: false

  - id: kv-transfer-mock
    desc: "KV-cache 跨节点迁移开销（带宽模型：NVLink/IB/TCP）"
    cmd: "python learning/distributed-inference/src/kv_transfer_mock.py"
    tier: V1
    v0: false
    gpu: false

  - id: routing-policies
    desc: "请求路由策略（round-robin / least-load / 亲和）对比"
    cmd: "python learning/distributed-inference/src/routing_policies.py"
    tier: V1
    v0: false
    gpu: false

  - id: distserve-original-minimal
    desc: "DistServe 风格 goodput 模拟器：SLO 下搜 prefill/decode GPU 配比"
    cmd: "python learning/distributed-inference/src/distserve_original_minimal.py"
    tier: V1
    v0: false
    gpu: false

  - id: capstone-disagg
    desc: "Capstone：disaggregated serving 综合对比 + Markdown 报告"
    cmd: "python learning/distributed-inference/src/capstone_disagg.py"
    tier: V1
    v0: false
    gpu: false
