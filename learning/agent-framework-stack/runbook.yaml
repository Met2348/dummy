# agent-framework-stack 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules agent-framework-stack
# 文档入口（README 总览表 L02-L07/L11/L12 对应的 8 个 src 脚本 + common 共享后端
#   + survey_taxonomy.py，后者是 paper/guide_01_survey_large_language_model_based_autonomous_agents.md
#   §14.1/§15 补的 toy 实现，README 总览表原漏列，本轮已补）：
# 全是手写主流 agent 框架（LangChain/LangGraph/LlamaIndex/Pydantic AI/Vercel AI SDK/
#   Claude Agent SDK）风格复现 + 选型决策树，纯 stdlib（dataclasses/typing/re），
#   零真实框架 import（grep 核实：无 langchain/llama_index/pydantic_ai/ai/anthropic 包依赖），CPU 秒级。
# 这些脚本全部无 argparse → v0: false（跳过 --help 探针，直接 smoke 直跑）。
# 每个脚本 __main__ = 跑内置 _self_test()（真断言，非 print-only）；capstone 额外打印 3-framework 对照 markdown 报告。
# harness 给每个模块设 PYTHONPATH=src，故裸导入（如 `from common import ...`）可解析；
# 命令用 repo-root 相对路径（Python 会把脚本自身所在目录插入 sys.path[0]，故也可脱离 harness 直接跑）。
# src/tests/test_frameworks.py 是聚合测试跑手（无 pytest test_ 函数）归 V2（--tests，
# pytest collect-0 → 回退按脚本直跑，10/10 真断言）；environment/verify_env.py 归 --env（纯打印 Python 版本，stdlib-only）。
module: agent-framework-stack
commands:
  # --- 共享后端（非独立 lecture，被 llamaindex/vercel/claude-sdk/survey/capstone 依赖）
  - id: common-selftest
    desc: "共享后端 self-test（mock_search 关键词命中 / mock_summarize 摘要 / FrameworkRun）"
    cmd: "python learning/agent-framework-stack/src/common.py"
    tier: V1
    v0: false
    gpu: false

  - id: survey-taxonomy
    desc: "论文 taxonomy toy self-test（memory_read_score 召回排序 + AgentDesign→framework_hint，paper guide §14.1，README 总览表原漏列已补）"
    cmd: "python learning/agent-framework-stack/src/survey_taxonomy.py"
    tier: V1
    v0: false
    gpu: false

  - id: langchain-style
    desc: "L02 LangChain LCEL `|` 管道 self-test（RunnableSequence/RunnableParallel/PromptTemplate）"
    cmd: "python learning/agent-framework-stack/src/langchain_style.py"
    tier: V1
    v0: false
    gpu: false

  - id: langgraph-style
    desc: "L03 LangGraph self-test（StateGraph + conditional edge + interrupt/resume + checkpoint 历史）"
    cmd: "python learning/agent-framework-stack/src/langgraph_style.py"
    tier: V1
    v0: false
    gpu: false

  - id: llamaindex-style
    desc: "L04 LlamaIndex self-test（Document→Node 切块 + VectorStoreIndex + QueryEngine）"
    cmd: "python learning/agent-framework-stack/src/llamaindex_style.py"
    tier: V1
    v0: false
    gpu: false

  - id: pydantic-ai-style
    desc: "L05 Pydantic AI self-test（TypedSchema 校验/类型强转 + run_sync 重试直到通过 schema）"
    cmd: "python learning/agent-framework-stack/src/pydantic_ai_style.py"
    tier: V1
    v0: false
    gpu: false

  - id: vercel-ai-sdk-style
    desc: "L06 Vercel AI SDK self-test（generateText 多步 tool loop + streamText 流式 chunk）"
    cmd: "python learning/agent-framework-stack/src/vercel_ai_style.py"
    tier: V1
    v0: false
    gpu: false

  - id: claude-agent-sdk-style
    desc: "L07 Claude Agent SDK self-test（query() + permissionMode + preToolUse hook 拦截危险 Bash）"
    cmd: "python learning/agent-framework-stack/src/claude_agent_sdk_style.py"
    tier: V1
    v0: false
    gpu: false

  - id: selection-tree
    desc: "L11 框架选型决策树 self-test（8 组 criteria→framework 场景断言）"
    cmd: "python learning/agent-framework-stack/src/selection_tree.py"
    tier: V1
    v0: false
    gpu: false

  - id: capstone-same-task
    desc: "L12 Capstone：同一 search+summary 任务用 LangChain LCEL / Vercel AI SDK / Claude Agent SDK 3 种风格实现，打印对照 markdown 表"
    cmd: "python learning/agent-framework-stack/src/capstone_same_task.py"
    tier: V1
    v0: false
    gpu: false
