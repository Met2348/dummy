# process-reward 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules process-reward
# 文档入口（README §运行验证）：7 个 PRM 工具箱直跑 demo（PRM/BoN/MCTS/PRIME/RLVR/Math-Shepherd/Capstone）。
# 这些脚本全部无 argparse → v0: false（跳过 --help 探针，直接 smoke 直跑到完成）。
# 纯数值/搜索 demo，CPU 即可（gpu: false）。
# 13 个 pytest 单测归 V2（--tests）；verify_env（math-verify/GSM8K 自检）归 --env。
module: process-reward
commands:
  - id: prm-minimal
    desc: "PRM 步级打分头 + 3-way loss + 4 种聚合（Lightman 2023）"
    cmd: "python learning/process-reward/src/prm_minimal.py"
    expect: "exit 0；打印 loss + mean/min/min_last/product 聚合分"
    tier: V1
    v0: false
    gpu: false

  - id: bon-search
    desc: "Best-of-N + majority / weighted-BoN 重排策略对比"
    cmd: "python learning/process-reward/src/bon_search.py"
    expect: "exit 0；打印 greedy/majority/bon/weighted_bon 命中"
    tier: V1
    v0: false
    gpu: false

  - id: math-shepherd-data-gen
    desc: "Math-Shepherd MC-rollout 自动生成 PRM 步级 label（Wang 2024）"
    cmd: "python learning/process-reward/src/math_shepherd_data_gen.py"
    expect: "exit 0；按 rollout 成功率打 good/neutral/bad + 输出 PRM 训练 JSON"
    tier: V1
    v0: false
    gpu: false

  - id: mcts-llm
    desc: "MCTS for LLM（UCT 选择/扩展/模拟/回传，rStar-Math 风格 toy）"
    cmd: "python learning/process-reward/src/mcts_llm.py"
    expect: "exit 0；打印最优路径 + root visits"
    tier: V1
    v0: false
    gpu: false

  - id: prime-minimal
    desc: "PRIME 隐式 PRM（actor/ref 对数差 → 步级 reward，Tsinghua 2025）"
    cmd: "python learning/process-reward/src/prime_minimal.py"
    expect: "exit 0；打印 per-token/step reward shape + PRIME advantage"
    tier: V1
    v0: false
    gpu: false

  - id: rlvr-demo
    desc: "RLVR 可验证奖励（GSM8K / Countdown / Code / Format / Combined）"
    cmd: "python learning/process-reward/src/rlvr_demo.py"
    expect: "exit 0；5 类规则奖励各打分（GSM8K/Countdown/Code/Format/Combined）"
    tier: V1
    v0: false
    gpu: false

  - id: capstone-prm-bon
    desc: "Capstone：GSM8K PRM 引导 Best-of-N（mock 候选，100 题 × 32 路真实重排对比）"
    cmd: "python learning/process-reward/src/capstone_prm_bon.py"
    expect: "exit 0；3 档 base acc 下打印 greedy/majority/bon/weighted_bon 准确率"
    tier: V1
    v0: false
    gpu: false
