# data-curation 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules data-curation
# 文档入口（README「实用入口」+「验证命令」）：13 个 demo / pipeline 脚本。
# 除 vocab_compare.py 外都有 argparse → v0: true（--help 探针）；vocab_compare 无参直跑 → v0: false。
# 5 个一致性测试归 V2（--tests）；verify_env 归 --env。
# 关键坑：
#   - spm_trainer / capstone(stage5) 的 SentencePiece 玩具语料有「vocab_size 两头夹」约束，
#     已在 train_spm 里自适应抬下界 + hard_vocab_limit=False（详见 README 运行验证段）。
#   - capstone --smoke 的 mock 语料原本太自相似 → dedup 后清空（空语料 no-op），已改成多样化高质量文档。
#   - magpie 的 runbook 用 --demo（纯模板 mock，CPU 秒级）；--real 走 GPU 下载真模型，是可选路径不进 smoke。
#   - detoxify / presidio / ftlangdetect 未装，但相关脚本均有真实回退（regex PII / lang=unk），demo 仍产出真输出。
module: data-curation
commands:
  - id: cc-extract
    desc: "CommonCrawl WARC 抽取（内置 mock HTML demo）"
    cmd: "python learning/data-curation/src/cc_extract.py --demo"
    tier: V1
    v0: true
    gpu: false
  - id: minhash-dedup
    desc: "MinHash + LSH 去重召回 demo"
    cmd: "python learning/data-curation/src/minhash_dedup.py --demo"
    tier: V1
    v0: true
    gpu: false
  - id: simhash-dedup
    desc: "手写 64-bit SimHash + Hamming demo"
    cmd: "python learning/data-curation/src/simhash_dedup.py --demo"
    tier: V1
    v0: true
    gpu: false
  - id: semdedup
    desc: "SemDeDup 语义去重（SentenceTransformer MiniLM，首次下 ~80MB）"
    cmd: "python learning/data-curation/src/semdedup_demo.py --demo"
    tier: V1
    v0: true
    gpu: false
  - id: quality-filter
    desc: "C4/Gopher 启发式 + FineWeb-Edu classifier 打分 demo"
    cmd: "python learning/data-curation/src/quality_filter.py --demo"
    tier: V1
    v0: true
    gpu: false
  - id: toxicity-pii
    desc: "Detoxify 毒性 + PII 匿名化 demo（presidio 缺则走 regex 回退）"
    cmd: "python learning/data-curation/src/toxicity_pii_filter.py --demo"
    tier: V1
    v0: true
    gpu: false
  - id: bpe-trainer
    desc: "手写 byte-level BPE 训练 demo"
    cmd: "python learning/data-curation/src/bpe_trainer.py --demo --vocab-size {vocab}"
    full:  { vocab: 400 }
    smoke: { vocab: 400 }
    tier: V1
    v0: true
    gpu: false
  - id: bpe-tiktoken
    desc: "tiktoken gpt2/cl100k/o200k 压缩率对照 demo"
    cmd: "python learning/data-curation/src/bpe_tiktoken.py --demo"
    tier: V1
    v0: true
    gpu: false
  - id: spm-trainer
    desc: "SentencePiece Unigram 训练 + subword regularization demo"
    cmd: "python learning/data-curation/src/spm_trainer.py --demo"
    tier: V1
    v0: true
    gpu: false
  - id: vocab-compare
    desc: "5 语言 tokenizer 压缩率对照（无参直跑，v0:false）"
    cmd: "python learning/data-curation/src/vocab_compare.py"
    tier: V1
    v0: false
    gpu: false
  - id: data-mix-ablation
    desc: "数据配比 ablation 玩具（MixSampler + mock ppl）"
    cmd: "python learning/data-curation/src/data_mix_ablation.py --demo"
    tier: V1
    v0: true
    gpu: false
  - id: magpie-synthesis
    desc: "Magpie 指令合成 mock demo（--real 走 GPU 真模型，可选不进 smoke）"
    cmd: "python learning/data-curation/src/magpie_synthesis.py --demo"
    tier: V1
    v0: true
    gpu: false
  - id: capstone-smoke
    desc: "Capstone 端到端流水（extract→dedup→quality→pii→tokenize）1k mock docs"
    cmd: "python learning/data-curation/src/capstone_mini_corpus.py --smoke --out {out}"
    full:  { out: "out/mini-corpus" }
    smoke: { out: "out/dc-capstone-smoke" }
    tier: V1
    v0: true
    gpu: false
