# tool-use-mcp 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules tool-use-mcp
# 文档入口：README 总览表 L02-L12 对应的 11 个 src 脚本 + common.py（共享类型库）
# + toolformer_toy.py（L01 前置，paper/guide_01_toolformer.md 明确文档化的入口命令，README 表已补列）。
# 全部纯 stdlib、无 argparse、CPU 秒级；MCP/A2A 都是 in-process mock（.handle() 直接函数调用，
# 无真实 stdio/网络/子进程 transport，无挂起风险）。
# 这些脚本全部无 argparse → v0: false（跳过 --help 探针，直接 smoke 直跑）。
# 每个脚本 __main__ = 跑内置 _self_test（真断言，如 injection 检测/sandbox 拒绝/circuit breaker 状态机）；
# capstone 额外打印 markdown 报告。
# harness 给每个模块设 PYTHONPATH=src，故裸 import（如 `from mcp_server import MCPServer`）可解析；
# 命令用 repo-root 相对路径（直接脚本调用，非 `python -c sys.path.insert` 一行流）。
# test_tools.py 聚合测试归 V2（--tests，pytest 收不到 test_ 函数→回退按脚本跑，打印 13/13）。
# 无 verify_env 入口跑（有 environment/verify_env.py，用 --env 验证，不进 runbook）。
module: tool-use-mcp
commands:
  - id: common-selftest
    desc: "共享类型 self-test（ToolSchema/ToolCall/ToolResult）"
    cmd: "python learning/tool-use-mcp/src/common.py"
    tier: V1
    v0: false
    gpu: false

  - id: toolformer-toy
    desc: "L01 前置·Toolformer 筛选玩具复现（L_minus-L_plus 打分，见 paper/guide_01_toolformer.md）"
    cmd: "python learning/tool-use-mcp/src/toolformer_toy.py"
    tier: V1
    v0: false
    gpu: false

  - id: openai-function-calling
    desc: "L02 OpenAI function calling schema 转换 + 解析 + 执行"
    cmd: "python learning/tool-use-mcp/src/openai_tools.py"
    tier: V1
    v0: false
    gpu: false

  - id: mcp-protocol
    desc: "L03 MCP JSON-RPC 2.0 envelope（request/response/error）"
    cmd: "python learning/tool-use-mcp/src/mcp_protocol.py"
    tier: V1
    v0: false
    gpu: false

  - id: mcp-server
    desc: "L04 MCP server（initialize/tools-list/tools-call in-memory 实现）"
    cmd: "python learning/tool-use-mcp/src/mcp_server.py"
    tier: V1
    v0: false
    gpu: false

  - id: mcp-client
    desc: "L05 MCP client（initialize+list_tools+call_tool 全流程 round-trip）"
    cmd: "python learning/tool-use-mcp/src/mcp_client.py"
    tier: V1
    v0: false
    gpu: false

  - id: a2a-minimal
    desc: "L06 A2A 协议（Agent Card + skill + task 生命周期）"
    cmd: "python learning/tool-use-mcp/src/a2a_minimal.py"
    tier: V1
    v0: false
    gpu: false

  - id: computer-use-mock
    desc: "L07 Computer Use mock（screenshot/click/type/key 状态机）"
    cmd: "python learning/tool-use-mcp/src/computer_use_mock.py"
    tier: V1
    v0: false
    gpu: false

  - id: sandbox-mock
    desc: "L08 Sandbox（AST 白名单 + 受限 exec，禁 import/eval/dunder）"
    cmd: "python learning/tool-use-mcp/src/sandbox_mock.py"
    tier: V1
    v0: false
    gpu: false

  - id: streaming-tools
    desc: "L09 流式工具 + cancel hook（同步 generator）"
    cmd: "python learning/tool-use-mcp/src/streaming_tools.py"
    tier: V1
    v0: false
    gpu: false

  - id: tool-retry
    desc: "L10 指数退避重试 + 熔断器（circuit breaker）"
    cmd: "python learning/tool-use-mcp/src/tool_retry.py"
    tier: V1
    v0: false
    gpu: false

  - id: tool-injection-demo
    desc: "L11 Prompt/Tool-output injection 检测 + 清洗（零宽字符/隐藏HTML/截断）"
    cmd: "python learning/tool-use-mcp/src/tool_injection_demo.py"
    tier: V1
    v0: false
    gpu: false

  - id: capstone-mcp-stack
    desc: "L12 Capstone：手写 MCP server(3工具) + client discover + 4 次调用（含1个预期错误）"
    cmd: "python learning/tool-use-mcp/src/capstone_mcp_stack.py"
    tier: V1
    v0: false
    gpu: false
