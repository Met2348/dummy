# infra-graduation 文档入口命令清单（runbook）
# 验证：.venv/Scripts/python.exe scripts/eric_3080ti_env_audit.py --runbook --modules infra-graduation
# M8 毕业模块（全仓 46/46 最后一个）。src/ 是包结构（sim/、eval/ 两个子包 + 顶层 portfolio_v3.py），
# 不同于前 6 个 M8 模块的平铺脚本布局。
#
# 全部 8 个脚本均无 argparse（grep -nE "add_argument|ArgumentParser" src/**/*.py 零命中）
# → v0: false（跳过 --help 探针，直接 smoke 直跑）。无可调预算参数 → 无 full/smoke 字段。
#
# ⚠️ 包导入陷阱（本模块和前 6 个 M8 模块的关键差异，README「环境配置」有完整解释）：
#   sim/cost_model.py / sim/time_to_train.py / sim/topology_selector.py / sim/capstone_1.py /
#   eval/mlperf_mock.py 用包内绝对导入 `from sim.common import ...`，Python 的 sys.path[0]
#   自动插入只会加脚本自己所在目录（如 src/sim/），加不到其父目录 src/，所以这 5 个脚本**不能**
#   直接裸跑 `python learning/infra-graduation/src/sim/cost_model.py`（已实测复现
#   `ModuleNotFoundError: No module named 'sim'`）。sim/common.py（无跨包 import）、
#   eval/mlperf_original_minimal.py（自包含）、portfolio_v3.py（自包含）这 3 个可以裸跑。
#   下面 `cmd` 仍按仓库惯例写成 repo-root 相对的 `python learning/infra-graduation/src/...py`——
#   这是因为 audit harness 的 `_env_for()`（scripts/eric_3080ti_env_audit.py 103-113 行）会给
#   **每个**模块的所有 runbook 命令自动注入 `PYTHONPATH=<module>/src`，所以这几个包导入脚本通过
#   `--runbook`/本文件跑完全没问题（已用 `PYTHONPATH=.../src python .../sim/cost_model.py` 实测
#   复现 harness 行为成功）。给人类读者的手动跑法（cmd 不经过 harness 时会失败）见 README。
module: infra-graduation
commands:
  - id: sim-common
    desc: "ClusterBlueprint/GPUSpec/FabricSpec/StorageSpec 数据类 + GPU/FABRIC/STORAGE_CATALOG self-test（唯一可裸跑的 sim/ 脚本，无跨包 import）"
    cmd: "python learning/infra-graduation/src/sim/common.py"
    tier: V1
    v0: false
    gpu: false
  - id: sim-cost-model
    desc: "TCO 模型：capex(GPU+fabric+storage) + opex(3y) + power self-test（含包导入陷阱，见页首注记）"
    cmd: "python learning/infra-graduation/src/sim/cost_model.py"
    tier: V1
    v0: false
    gpu: false
  - id: sim-time-to-train
    desc: "端到端 time-to-train 估算：FLOPs/peak/util + overhead_factor self-test（含包导入陷阱）"
    cmd: "python learning/infra-graduation/src/sim/time_to_train.py"
    tier: V1
    v0: false
    gpu: false
  - id: sim-topology-selector
    desc: "拓扑选型器：(model, budget, deadline) → 最便宜可行 ClusterBlueprint self-test（含包导入陷阱）"
    cmd: "python learning/infra-graduation/src/sim/topology_selector.py"
    tier: V1
    v0: false
    gpu: false
  - id: sim-capstone-1
    desc: "Capstone-1：3 模型 × 6 集群配置 = 18 场景 time-to-train + TCO 矩阵（含包导入陷阱）"
    cmd: "python learning/infra-graduation/src/sim/capstone_1.py"
    tier: V1
    v0: false
    gpu: false
  - id: eval-mlperf-mock
    desc: "Capstone-2：MLPerf 风格 5-task H100 vs B200 speedup 打分（含包导入陷阱）"
    cmd: "python learning/infra-graduation/src/eval/mlperf_mock.py"
    tier: V1
    v0: false
    gpu: false
  - id: eval-mlperf-original-minimal
    desc: "MLPerf Training 论文规则复现：time-to-quality trimmed mean + closed/open division 校验（自包含，可裸跑）"
    cmd: "python learning/infra-graduation/src/eval/mlperf_original_minimal.py"
    tier: V1
    v0: false
    gpu: false
  - id: portfolio-v3
    desc: "Capstone-3：46-topic Portfolio v3 生成器 self-test + 落盘到系统临时目录（自包含，可裸跑）"
    cmd: "python learning/infra-graduation/src/portfolio_v3.py"
    tier: V1
    v0: false
    gpu: false
