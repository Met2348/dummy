# training-orchestration 文档入口命令清单（runbook）
# 验证：.venv/Scripts/python.exe scripts/eric_3080ti_env_audit.py --runbook --modules training-orchestration
# 文档入口：lectures/06-capstone.md 给出 capstone_cluster_run.py 的预期输出表；paper/guide_01_ray.md §19
#   给出 tests/test_all.py 的跑法；其余 6 个 src 脚本无 lecture 显式 python 命令，但均有 __main__ 直跑
#   self-test，按惯例（同 gpu-architecture/cuda-essentials/kernel-engineering/cluster-networking/
#   storage-dataops）一并登记。
# 全部 8 个脚本均无 argparse（grep -nE "add_argument|ArgumentParser|__main__" src/*.py 只命中 __main__，
#   零 add_argument/ArgumentParser）→ v0: false（跳过 --help 探针，直接 smoke 直跑）。无可调预算参数 →
#   无 full/smoke 字段。
# import 情况：common.py/fault_tolerance.py/ray_actors.py/ray_original_minimal.py/elastic_training.py
#   无跨文件 import（ray_actors.py/ray_original_minimal.py 已核实零 `import ray`，是用纯 dataclass 手写
#   模拟 Ray 论文机制，非依赖真实 ray 包——.venv 里也确认未装 ray）；slurm_scheduler.py/gang_scheduling.py
#   `from common import Job, Node, JobState`；capstone_cluster_run.py `from common import ...` +
#   `from slurm_scheduler import fifo_with_backfill, release` + `from fault_tolerance import FaultModel,
#   optimal_ckpt_interval` 三路跨文件 import。已实测直接 `python learning/training-orchestration/src/X.py`
#   （不设 PYTHONPATH，从 repo 根目录跑）对全部 8 个脚本都可行：Python 自动把脚本所在目录插入
#   sys.path[0]，同目录 common.py/slurm_scheduler.py/fault_tolerance.py 都能正常 import。
# 全部脚本仅纯 stdlib（dataclasses/enum/math/__future__）计算，CPU 秒级，无需 GPU、无需装包、无网络依赖。
# 没有 environment/ 目录、没有 verify_env.py（--env 对本模块 N/A）。
# src/tests/test_all.py 只有 def main()，无 test_ 前缀函数 → pytest 下 collect-0（rc=5，已实测确认非 exit
#   0），harness `_run_test_command`（166-185 行）会自动回退直接 `python tests/test_all.py` 执行（已实测
#   8/8 passed），归 V2（--tests），不在此重复登记。
module: training-orchestration
commands:
  - id: common
    desc: "Job/Node/JobState 数据类 + make_cluster() self-test"
    cmd: "python learning/training-orchestration/src/common.py"
    tier: V1
    v0: false
    gpu: false
  - id: slurm-scheduler
    desc: "Slurm 风格 FIFO + backfill 调度（try_assign/release/fifo_with_backfill）self-test"
    cmd: "python learning/training-orchestration/src/slurm_scheduler.py"
    tier: V1
    v0: false
    gpu: false
  - id: gang-scheduling
    desc: "Gang scheduling 原子 all-or-nothing 分配 + starvation 检测 self-test"
    cmd: "python learning/training-orchestration/src/gang_scheduling.py"
    tier: V1
    v0: false
    gpu: false
  - id: fault-tolerance
    desc: "集群 MTBF 可加性模型 + Young's formula 最优 ckpt 间隔 + 浪费率 self-test"
    cmd: "python learning/training-orchestration/src/fault_tolerance.py"
    tier: V1
    v0: false
    gpu: false
  - id: ray-actors
    desc: "Ray 风格有状态 actor 模型（TrainerActor/ParameterServer 方法调度）self-test，纯 dataclass 手写模拟，不依赖真实 ray 包"
    cmd: "python learning/training-orchestration/src/ray_actors.py"
    tier: V1
    v0: false
    gpu: false
  - id: ray-original-minimal
    desc: "复现 Ray 论文机制：GCS/bottom-up scheduler/object store/lineage reconstruction self-test，纯 dataclass 手写模拟，不依赖真实 ray 包"
    cmd: "python learning/training-orchestration/src/ray_original_minimal.py"
    tier: V1
    v0: false
    gpu: false
  - id: elastic-training
    desc: "Torchrun 风格弹性 rendezvous（节点动态 join/leave + quorum/generation）self-test"
    cmd: "python learning/training-orchestration/src/elastic_training.py"
    tier: V1
    v0: false
    gpu: false
  - id: capstone-cluster-run
    desc: "Capstone：64节点×8GPU=512GPU 集群单点调度快照，8 个混合优先级 job 跑 FIFO+backfill，叠加同集群规模的 Young's formula 故障容忍开销"
    cmd: "python learning/training-orchestration/src/capstone_cluster_run.py"
    tier: V1
    v0: false
    gpu: false
