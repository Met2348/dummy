# rag-essential 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules rag-essential
# 文档入口：README 总览表 L02-L14 对应的 14 个 src 脚本 + common 共享后端
#   + rag_original_minimal.py（paper/guide_01 论文伴读脚本，非 README 总览表但被 paper guide 点名要跑）。
# 全部 stdlib-only（mock hash embedding / mock reranker / mock LLM，见 environment/requirements.txt），
# 无 faiss/chromadb/sentence-transformers 等重型检索栈，无需缩小版/GPU。
# 这些脚本全部无 argparse -> v0: false（跳过 --help 探针，直接 smoke 直跑）。
# 每个脚本 __main__ = 跑内置 _self_test()（真断言，非 print-only）；capstone 额外打印 6 策略 x 4 RAGAS 对照 markdown。
# 注：hash_embed 用 Python 内置 hash()，逐进程随机种子 -> capstone 具体分数逐次运行会有小幅浮动
#   （25 次独立进程重跑实测排名/结论稳定，无 FAIL；_self_test 全用相对/阈值断言不依赖具体数值，非假成功）。
# src/tests/test_rag.py 是聚合测试跑手（无 pytest test_ 函数）归 V2（--tests，pytest collect-0 -> 回退按脚本
# 直跑，15/15 真断言）；environment/verify_env.py 归 --env。
module: rag-essential
commands:
  - id: common-selftest
    desc: "共享后端 self-test（Doc/Chunk/RetrievalResult/hash_embed/cosine/tokenize + 20 样例文档）"
    cmd: "python learning/rag-essential/src/common.py"
    tier: V1
    v0: false
    gpu: false

  - id: chunker
    desc: "L03 Chunking 策略 self-test（fixed / sentence / semantic）"
    cmd: "python learning/rag-essential/src/chunker.py"
    tier: V1
    v0: false
    gpu: false

  - id: naive-rag
    desc: "L02 Naive RAG self-test（embed + cosine top-k）"
    cmd: "python learning/rag-essential/src/naive_rag.py"
    tier: V1
    v0: false
    gpu: false

  - id: bm25-minimal
    desc: "L05a BM25 self-test（Robertson 1994 k1/b 打分）"
    cmd: "python learning/rag-essential/src/bm25_minimal.py"
    tier: V1
    v0: false
    gpu: false

  - id: hybrid-retrieval
    desc: "L05b Hybrid retrieval self-test（BM25 + dense + RRF fusion）"
    cmd: "python learning/rag-essential/src/hybrid.py"
    tier: V1
    v0: false
    gpu: false

  - id: reranker-mock
    desc: "L06 Reranker self-test（关键词重合度模拟 cross-encoder）"
    cmd: "python learning/rag-essential/src/reranker_mock.py"
    tier: V1
    v0: false
    gpu: false

  - id: colbert-minimal
    desc: "L07 ColBERT self-test（per-token 向量 + MaxSim late interaction, Khattab 2020）"
    cmd: "python learning/rag-essential/src/colbert_minimal.py"
    tier: V1
    v0: false
    gpu: false

  - id: hyde-demo
    desc: "L08 HyDE self-test（mock LLM 写假设性答案再检索, Gao 2022）"
    cmd: "python learning/rag-essential/src/hyde_demo.py"
    tier: V1
    v0: false
    gpu: false

  - id: graph-rag
    desc: "L09 GraphRAG self-test（entity 抽取 + 连通分量社区 + 摘要, Microsoft 2024）"
    cmd: "python learning/rag-essential/src/graph_rag.py"
    tier: V1
    v0: false
    gpu: false

  - id: hipporag
    desc: "L10 HippoRAG self-test（entity graph + personalized PageRank, OSU 2024）"
    cmd: "python learning/rag-essential/src/hipporag.py"
    tier: V1
    v0: false
    gpu: false

  - id: rag-fusion
    desc: "L11 RAG-Fusion / Multi-Query self-test（query 改写 + RRF）"
    cmd: "python learning/rag-essential/src/rag_fusion.py"
    tier: V1
    v0: false
    gpu: false

  - id: self-rag
    desc: "L12 Self-RAG/CRAG self-test（confidence 三档分支 + mock web fallback，工程版 CRAG 实现）"
    cmd: "python learning/rag-essential/src/self_rag.py"
    tier: V1
    v0: false
    gpu: false

  - id: ragas-metrics
    desc: "L13 RAGAS self-test（faithfulness / answer_relevancy / context_precision / context_recall）"
    cmd: "python learning/rag-essential/src/ragas_metrics.py"
    tier: V1
    v0: false
    gpu: false

  - id: rag-original-minimal
    desc: "paper 伴读：RAG-Sequence/RAG-Token 边缘化 + DPR 内积 + index hot-swap 玩具复现（Lewis 2020, arXiv:2005.11401）"
    cmd: "python learning/rag-essential/src/rag_original_minimal.py"
    tier: V1
    v0: false
    gpu: false

  - id: capstone-rag-compare
    desc: "L14 Capstone：6 策略（naive/hybrid/hybrid+rerank/HyDE/GraphRAG/HippoRAG）x 4 RAGAS 维度横评"
    cmd: "python learning/rag-essential/src/capstone_rag_compare.py"
    tier: V1
    v0: false
    gpu: false
