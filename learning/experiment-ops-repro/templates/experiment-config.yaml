# config as code 模板 (9.5-L2) · 一个 run = 一份 config + 一个 seed
# 原则: 任何会影响结果的数都进这里, 代码里不写死任何超参.

experiment:
  name: dpo-noise-robustness        # 一句话说清这次实验
  project: dpo-noise-robustness     # 追踪用的 project 名

method:
  name: Robust-DPO                  # 自变量之一 (消融时被替换)
  beta: 0.1
  # ...方法特有超参...

train:
  lr: 1.0e-4
  batch_size: 32
  epochs: 3
  # total compute 也固定, 保证对照公平 (L3 控混淆)

data:
  dataset: hh-rlhf                  # 数据集名
  revision: v2-abc123               # 版本/commit (L4: 数据也要版本!)
  noise: 0.4                        # 自变量之二 (条件消融)
  # data_hash: <sha256>             # 可选: 关键文件哈希

repro:
  seed: 3                           # 确定性的钥匙 (L1). 扫种子时被替换
  deterministic: true               # 是否开 GPU 确定性算法 (有性能代价)

# 用法: 消融矩阵 = 对 method.name × data.noise × repro.seed 做笛卡尔积,
#       每个组合是一份这样的 config, 喂给训练代码 + exp_tracker 留痕.
