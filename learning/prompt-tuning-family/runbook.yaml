# prompt-tuning-family 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules prompt-tuning-family
# 文档入口（README §6 使用说明）：9 个 minimal/peft 直跑 demo。
# 这些脚本无 argparse → v0: false（跳过 --help 探针，直接 smoke 直跑）。
# 4 个一致性测试归 V2（--tests）；verify_env 归 --env。
module: prompt-tuning-family
commands:
  - id: prompt-tuning-minimal
    desc: "Prompt Tuning 手写最小实现"
    cmd: "python learning/prompt-tuning-family/src/prompt_tuning_minimal.py"
    tier: V1
    v0: false
    gpu: true
  - id: prompt-tuning-peft
    desc: "Prompt Tuning peft 对照"
    cmd: "python learning/prompt-tuning-family/src/prompt_tuning_peft.py"
    tier: V1
    v0: false
    gpu: true
  - id: prefix-tuning-minimal
    desc: "Prefix Tuning 手写最小实现"
    cmd: "python learning/prompt-tuning-family/src/prefix_tuning_minimal.py"
    tier: V1
    v0: false
    gpu: true
  - id: prefix-tuning-original
    desc: "Prefix Tuning 原版最小实现"
    cmd: "python learning/prompt-tuning-family/src/prefix_tuning_original_minimal.py"
    tier: V1
    v0: false
    gpu: true
  - id: prefix-tuning-peft
    desc: "Prefix Tuning peft 对照"
    cmd: "python learning/prompt-tuning-family/src/prefix_tuning_peft.py"
    tier: V1
    v0: false
    gpu: true
  - id: p-tuning-minimal
    desc: "P-Tuning v1 手写最小实现"
    cmd: "python learning/prompt-tuning-family/src/p_tuning_minimal.py"
    tier: V1
    v0: false
    gpu: true
  - id: p-tuning-peft
    desc: "P-Tuning v1 peft 对照"
    cmd: "python learning/prompt-tuning-family/src/p_tuning_peft.py"
    tier: V1
    v0: false
    gpu: true
  - id: p-tuning-v2-minimal
    desc: "P-Tuning v2 手写最小实现"
    cmd: "python learning/prompt-tuning-family/src/p_tuning_v2_minimal.py"
    tier: V1
    v0: false
    gpu: true
  - id: p-tuning-v2-peft
    desc: "P-Tuning v2 peft 对照"
    cmd: "python learning/prompt-tuning-family/src/p_tuning_v2_peft.py"
    tier: V1
    v0: false
    gpu: true
