# long-context 文档入口命令清单（runbook）
# 验证：.venv/Scripts/python.exe scripts/eric_3080ti_env_audit.py --runbook --modules long-context \
#   --json-out docs/local-env/ERIC-3080Ti-runbook-results.json --md-out docs/local-env/ERIC-3080Ti-runbook-matrix.md
# 文档入口（README L01-L13 代码列）：10 个 from-scratch RoPE/YaRN/NTK/PI/3D + Ring/Infini-Attention + NIAH/RULER + 数据打包直跑 demo，外加 1 个 capstone 骨架。
# 这 10 个 demo 均无 argparse（只有 __main__ 直跑，无 add_argument/ArgumentParser）→ v0: false（跳过 --help 探针，直接 smoke 直跑）。
#   common.py 是纯 helper（无 __main__）→ 非入口，不列。
#   capstone_yarn_llama32.py 有 argparse（--train/--scale/--steps…），默认 dry-run（不带 --train 只打印 curriculum 后 exit 0）→ v0: true（--help 可探）；smoke 跑默认 dry-run（真算 8192→16384→32768 课程，秒级、诚实非 no-op）。
#     full 形态 `--train --steps 500` 需 HF-gated meta-llama/Llama-3.2-1B-Instruct 权重 + 5090/24G 级显存 + ~5.5h，本机不真跑（仅 dry-run 入 runbook）。
# harness 通过 PYTHONPATH 注入 learning/long-context/src，因此脚本内 `from common import …` 等裸 import 在 repo-root cwd 下也能解析（与 ssm-hybrid/moe-architecture 同机制）。
# 5 个一致性测试（src/tests/）归 V2（--tests）；environment/verify_env.py 归 --env。
# 无 official/ 子模块（.gitmodules 无 long-context 条目）。
# 关键坑注记：
#   - 全部为纯数值/结构 self-test，CPU 秒级 PASS 是正常的（RoPE/PI/NTK/YaRN/3D 是纯数学旋转；ring-naive 真做 online-softmax 分块累积，max diff 2.38e-07 ≈ vanilla attention；非 no-op/假成功）。
#   - ring_attention_lib：可选库 ring-flash-attention（Linux 多 GPU only）本机未装。脚本 has_lib() 真探测 → False → 打印 `[SKIP] 仅 Linux 多 GPU 可用` 后 exit 0。
#     这是**诚实的"无外部依赖即跳过"**（非系统性坑#4 假成功——它没有捕获异常伪装成功，而是显式报告库不存在；可运行的真实等价物即 ring_attention_naive 已单列）。tier 保留 V1。
#   - 早期 env audit 修过的两处真实 bug 现已在已提交代码中修好，本轮复验无回归：
#       · rope_3d M-RoPE 分段 shape：seg=dim//6*2 + inv_freq_seg[:(end-start)//2] 切片对齐，out shape (2,8,24) 正确。
#       · long_data_packing 超长 doc：pack_documents 对 len(d)>max_len 先按 max_len 切块（行 17-22）再 first-fit，杜绝单 doc 撑爆 batch。
#   - 全部 CPU 默认（无 .cuda() 默认路径；device 取自输入张量/默认 CPU）→ gpu: false。capstone dry-run 也纯 CPU 打印，不加载权重。
module: long-context
commands:
  - id: rope-pi
    desc: "Position Interpolation (Meta 2023) — 把 position 压缩 scale 倍，cos/sin self-test"
    cmd: "python learning/long-context/src/rope_pi.py"
    tier: V1
    v0: false
    gpu: false
  - id: rope-ntk
    desc: "NTK-aware RoPE（改 base 而非 position）vs 原 RoPE 角度差 self-test"
    cmd: "python learning/long-context/src/rope_ntk.py"
    tier: V1
    v0: false
    gpu: false
  - id: rope-yarn
    desc: "YaRN（NTK-by-parts ramp + attention temperature，Peng 2023）cos/sin + attn_scale self-test"
    cmd: "python learning/long-context/src/rope_yarn.py"
    tier: V1
    v0: false
    gpu: false
  - id: rope-3d
    desc: "3D / M-RoPE（Qwen2-VL 式，dim 分 3 段 t/h/w 各独立旋转）forward shape self-test"
    cmd: "python learning/long-context/src/rope_3d.py"
    tier: V1
    v0: false
    gpu: false
  - id: ring-attention-naive
    desc: "Ring Attention naive（单 GPU 模拟分块 online-softmax，max diff 2.4e-07≈vanilla）数值等价 self-test"
    cmd: "python learning/long-context/src/ring_attention_naive.py"
    tier: V1
    v0: false
    gpu: false
  - id: ring-attention-lib
    desc: "ring-flash-attention 库 wrapper（探测可选 Linux 多 GPU 库；本机未装→诚实 [SKIP] exit 0）"
    cmd: "python learning/long-context/src/ring_attention_lib.py"
    tier: V1
    v0: false
    gpu: false
  - id: infini-attention
    desc: "Infini-Attention（local causal attn + sigmoid compressive memory retrieval/update + per-head gate）forward self-test"
    cmd: "python learning/long-context/src/infini_attention.py"
    tier: V1
    v0: false
    gpu: false
  - id: niah-eval
    desc: "NIAH（Needle in a Haystack）测试集生成器（构造 needle+haystack+query，不跑模型）self-test"
    cmd: "python learning/long-context/src/niah_eval.py"
    tier: V1
    v0: false
    gpu: false
  - id: ruler-eval
    desc: "RULER（NVIDIA 2024）4 子任务题目生成器（S/MK/MV-NIAH + variable-tracking）self-test"
    cmd: "python learning/long-context/src/ruler_eval.py"
    tier: V1
    v0: false
    gpu: false
  - id: long-data-packing
    desc: "长 ctx 数据打包（first-fit 超长切块 + block-diagonal doc mask + 课程长度）self-test，packing eff 98.75%"
    cmd: "python learning/long-context/src/long_data_packing.py"
    tier: V1
    v0: false
    gpu: false
  - id: capstone-yarn-llama32
    desc: "Capstone：Llama-3.2-1B + YaRN scale=4 扩 32k + LoRA 骨架。默认 dry-run（打印 8192→16384→32768 课程）；真训需 --train + HF-gated 权重 + 5090/24G ~5.5h"
    cmd: "python learning/long-context/src/capstone_yarn_llama32.py {train}"
    full:  { train: "--train --steps 500" }
    smoke: { train: "" }
    tier: V1
    v0: true
    gpu: false
