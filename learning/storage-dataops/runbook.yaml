# storage-dataops 文档入口命令清单（runbook）
# 验证：.venv/Scripts/python.exe scripts/eric_3080ti_env_audit.py --runbook --modules storage-dataops
# 文档入口：6 篇 lecture（01-06）都是纯 prose/表格，没有任何 `python ...` 命令；论文导读
#   `paper/guide_01_accelerating_data_loading.md` §19 给出唯一一条可跑命令
#   （`tests/test_all.py`，归 V2，不在此重复登记）。7 个 src 脚本全部有 `if __name__ == "__main__":`
#   直跑 `_self_test()`，按惯例（同 gpu-architecture/cuda-essentials/kernel-engineering/cluster-networking）
#   一并登记为文档入口。
# 全部 7 个脚本均无 argparse（grep -nE "add_argument|ArgumentParser|__main__" src/*.py 只命中 __main__，
#   零 add_argument/ArgumentParser）→ v0: false（跳过 --help 探针，直接 smoke 直跑）。无可调预算参数 →
#   无 full/smoke 字段。
# import 情况：common.py/dataloader.py/webdataset_style.py/data_loading_original_minimal.py/sharding.py
#   只用 dataclasses+__future__（sharding.py 额外 `import hashlib`，标准库，仍不跨文件）；checkpoint.py
#   `from common import Storage`；capstone_ckpt_recovery.py `from common import TIERS` +
#   `from checkpoint import full_checkpoint, sharded_checkpoint, async_sharded`（同 gpu-architecture/
#   cuda-essentials/cluster-networking 模式）。已实测直接 `python learning/storage-dataops/src/X.py`
#   （不设 PYTHONPATH，从 repo 根目录跑）对全部 7 个脚本都可行：Python 自动把脚本所在目录插入
#   sys.path[0]，同目录下的 common.py/checkpoint.py 都能被正常 import。
# 全部脚本仅纯 stdlib（dataclasses/hashlib/random(仅测试用)）计算，CPU 秒级，无需 GPU、无需装包、无网络
# 依赖。checkpoint.py/capstone_ckpt_recovery.py 是纯数值代价模型（CkptCost 数据类算 sec/bytes_written/
# blocking），**不写任何真实文件到磁盘**（源码内 grep 零 open()/write()/os. 命中）。
# 没有 environment/ 目录、没有 verify_env.py（--env 对本模块 N/A）。
# src/tests/test_all.py 只有 def main()，无 test_ 前缀函数 → pytest 下 collect-0（rc=5），harness
#   `_run_test_command` 会自动回退直接 `python tests/test_all.py` 执行（已实测 7/7 passed），归 V2
#   （--tests），不在此重复登记。
module: storage-dataops
commands:
  - id: common
    desc: "Storage 数据类 + 6 层存储(RAM/NVMe/NVMe-RAID/Lustre/GPFS/S3) 读时延 self-test"
    cmd: "python learning/storage-dataops/src/common.py"
    tier: V1
    v0: false
    gpu: false
  - id: dataloader
    desc: "4 阶段 dataloader pipeline(fetch/decode/augment/collate) 串行 vs N-worker 流水线加速 self-test"
    cmd: "python learning/storage-dataops/src/dataloader.py"
    tier: V1
    v0: false
    gpu: false
  - id: data-loading-original-minimal
    desc: "复现《Accelerating Data Loading in DNN Training》(arXiv:1910.01196) 的 cost model(eq.D/R下界)+distributed cache(eq.7)+locality-aware(eq.8)+Algorithm 1 balance self-test"
    cmd: "python learning/storage-dataops/src/data_loading_original_minimal.py"
    tier: V1
    v0: false
    gpu: false
  - id: sharding
    desc: "hash(sha1)/range/round-robin 三种 sharding 策略的 bytes-per-shard 不均衡度 self-test"
    cmd: "python learning/storage-dataops/src/sharding.py"
    tier: V1
    v0: false
    gpu: false
  - id: checkpoint
    desc: "full/sharded/async 三种 checkpoint 策略的耗时代价模型(纯数值，非真实磁盘IO) self-test"
    cmd: "python learning/storage-dataops/src/checkpoint.py"
    tier: V1
    v0: false
    gpu: false
  - id: webdataset-style
    desc: "WebDataset 风格 tar shard 顺序读 vs 随机小文件读(IOPS-bound) 加速比 self-test"
    cmd: "python learning/storage-dataops/src/webdataset_style.py"
    tier: V1
    v0: false
    gpu: false
  - id: capstone-ckpt-recovery
    desc: "Capstone：70B/512GPU/7天训练，三种 ckpt 策略的 blocking + 故障恢复(MTBF 24h) 总开销对比"
    cmd: "python learning/storage-dataops/src/capstone_ckpt_recovery.py"
    tier: V1
    v0: false
    gpu: false
