# eval-foundations 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules eval-foundations
# 文档入口（README 总览表 L01-L12 的 10 个 src 脚本）：全是手写 mock 评测 runner，纯 CPU 秒级。
# 这些脚本全部无 argparse → v0: false（跳过 --help 探针，直接 smoke 直跑）。
# 每个脚本 __main__ = 跑内置 _self_test（含 oracle=100% / random∈[0,1] 真实断言）+ 打印一个 random baseline demo。
# harness 给每个模块设 PYTHONPATH=src，故 `from common import ...` 裸导入可解析；命令用 repo-root 相对路径。
# test_eval.py 测试套件归 V2（--tests，pytest 收不到→回退按脚本跑，打印 10/10）。无 verify_env（无 --env 项）。
module: eval-foundations
commands:
  # --- common.py：L01 共享后端（mock model + 抽取器 + 聚合器）。
  # 注：它的 __main__ 是“共享库 self-test”而非独立 demo，但 README 把它列为 L01 代码、且秒级可跑，故登记 V1。
  - id: common-selftest
    desc: "L01 共享后端 self-test（mock model / extract_letter / accuracy）"
    cmd: "python learning/eval-foundations/src/common.py"
    tier: V1
    v0: false
    gpu: false

  - id: mmlu
    desc: "L02 MMLU runner（12 题 4 学科，真算逐题 acc + by_subject）"
    cmd: "python learning/eval-foundations/src/mmlu_runner.py"
    tier: V1
    v0: false
    gpu: false

  - id: mmlu-pro
    desc: "L03 MMLU-Pro runner（10 选项 A-J，chance~10%）"
    cmd: "python learning/eval-foundations/src/mmlu_pro_runner.py"
    tier: V1
    v0: false
    gpu: false

  - id: helm-local
    desc: "L04 mini-HELM（4 scenario × metric 整体性表格）"
    cmd: "python learning/eval-foundations/src/helm_local.py"
    tier: V1
    v0: false
    gpu: false

  - id: bbh
    desc: "L06 BBH runner（tracking/date/logic 3 task，by_task acc）"
    cmd: "python learning/eval-foundations/src/bbh_runner.py"
    tier: V1
    v0: false
    gpu: false

  - id: truthfulqa
    desc: "L07 TruthfulQA runner（MC1 抗常见误解，higher acc != truer）"
    cmd: "python learning/eval-foundations/src/truthfulqa_runner.py"
    tier: V1
    v0: false
    gpu: false

  - id: commonsense
    desc: "L08 HellaSwag/ARC/Winogrande runner（by_bench acc）"
    cmd: "python learning/eval-foundations/src/commonsense_runner.py"
    tier: V1
    v0: false
    gpu: false

  - id: lm-eval-adapter
    desc: "L09 lm-eval-harness 风格 Task API 适配器（duck-typed mock）"
    cmd: "python learning/eval-foundations/src/lm_eval_adapter.py"
    tier: V1
    v0: false
    gpu: false

  - id: contamination-check
    desc: "L10 污染检测（13-gram 重叠 + canary + Min-K%++ 草图，真算 overlap）"
    cmd: "python learning/eval-foundations/src/contamination_check.py"
    tier: V1
    v0: false
    gpu: false

  - id: capstone-eval-pipeline
    desc: "L12 Capstone：MMLU+BBH+TruthfulQA+Commonsense 4-bench 联跑 → md 报告 + ASCII 条"
    cmd: "python learning/eval-foundations/src/eval_pipeline.py"
    tier: V1
    v0: false
    gpu: false
