# cuda-essentials 文档入口命令清单（runbook）
# 验证：.venv/Scripts/python.exe scripts/eric_3080ti_env_audit.py --runbook --modules cuda-essentials
# 文档入口：lectures/07-capstone-softmax.md 明确给出 capstone_softmax.py 跑法；
#   paper/guide_01_cuda_cpp_programming_guide.md §20/§24 给出 cuda_original_minimal.py 对应关系
#   + tests/test_all.py 跑法；其余 6 个 src 脚本（common/vector_add/warp_primitives/
#   shared_memory/coalescing/reduce_kernel/gemm_tiled）无 lecture 显式 python 命令，但均有
#   __main__ 直跑 self-test，按惯例（同 gpu-architecture）一并登记。
# 全部 9 个脚本均无 argparse（grep 全仓只有 dataclasses/math/__future__ 相关 import，
#   零 add_argument/ArgumentParser）→ v0: false（跳过 --help 探针，直接 smoke 直跑）。
#   无可调预算参数 → 无 full/smoke 字段。
# 全部脚本仅 import 标准库（dataclasses/math）+ 互相 import（vector_add←common，
#   reduce_kernel←warp_primitives）→ CPU 秒级，无需 GPU、无需装包。本模块代码是
#   CUDA 执行模型的纯 Python 数值模拟（非真实 .cu/Triton kernel），paper 导读 §20 明确
#   写"本专题代码都是 Python mock，目标是帮助你在没有真实 CUDA 编译环境时也能练机制"。
# 没有 environment/ 目录、没有 verify_env.py（--env 对本模块 N/A）。
# tests/test_all.py 只有 def main()，无 test_ 前缀函数 → pytest 下 collect-0（rc=5），
#   harness `_run_test_command` 会自动回退直接 `python tests/test_all.py` 执行，
#   归 V2（--tests），不在此重复登记。
# 顺序与 tests/test_all.py 的 MODULES 列表一致（模块自身的聚合顺序）。
module: cuda-essentials
commands:
  - id: common
    desc: "CUDA 执行模型 mock：Grid/Block/Thread dataclass + 1D launch_config self-test"
    cmd: "python learning/cuda-essentials/src/common.py"
    tier: V1
    v0: false
    gpu: false
  - id: vector-add
    desc: "Vector-add kernel（CUDA hello world）：gid 映射 + 边界检查 self-test"
    cmd: "python learning/cuda-essentials/src/vector_add.py"
    tier: V1
    v0: false
    gpu: false
  - id: warp-primitives
    desc: "Warp 级原语：shfl_down_sync 树规约 + ballot_sync self-test"
    cmd: "python learning/cuda-essentials/src/warp_primitives.py"
    tier: V1
    v0: false
    gpu: false
  - id: shared-memory
    desc: "Shared memory bank conflict 模型（32 bank，stride/broadcast）self-test"
    cmd: "python learning/cuda-essentials/src/shared_memory.py"
    tier: V1
    v0: false
    gpu: false
  - id: coalescing
    desc: "全局内存 coalescing 模型（128B sector，stride 1/2/8/32 效率对比）self-test"
    cmd: "python learning/cuda-essentials/src/coalescing.py"
    tier: V1
    v0: false
    gpu: false
  - id: reduce-kernel
    desc: "Reduce 三代对比：naive / Brent-Kung 树 / warp-shuffle self-test"
    cmd: "python learning/cuda-essentials/src/reduce_kernel.py"
    tier: V1
    v0: false
    gpu: false
  - id: gemm-tiled
    desc: "Tiled GEMM：naive vs shared-memory-style 分块复用 + HBM 流量对比 self-test"
    cmd: "python learning/cuda-essentials/src/gemm_tiled.py"
    tier: V1
    v0: false
    gpu: false
  - id: cuda-original-minimal
    desc: "复现 CUDA C++ Programming Guide 官方手册自身例子（linearization/occupancy/stream/graph）self-test"
    cmd: "python learning/cuda-essentials/src/cuda_original_minimal.py"
    tier: V1
    v0: false
    gpu: false
  - id: capstone-softmax
    desc: "Capstone：数值稳定 softmax，naive 3-pass vs online 1-pass（FlashAttention 前置）self-test"
    cmd: "python learning/cuda-essentials/src/capstone_softmax.py"
    tier: V1
    v0: false
    gpu: false
