# lora-family 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules lora-family --timeout 600
# 文档入口（README §目录结构 + lectures）：12 种 LoRA 方法的 minimal（手写）+ peft（调包）对照 demo。
# 这些脚本均无 argparse（直跑 main，固定小预算 GPT-2/TinyLlama）→ v0: false（跳过 --help 探针，直接 smoke 直跑）。
# 10 个一致性测试归 V2（--tests，~280s 重）；verify_env 归 --env。
# 注：src 的实际文件比 README "目录结构" 段列的略有出入（无 pissa_olora_extension.py；loha+lokr 合并为 loha_lokr_peft.py）；本清单以实际 src 为准。
module: lora-family
commands:
  # ---- 01 LoRA（+ rsLoRA / LoRA+ 扩展）----
  - id: lora-minimal
    desc: "LoRA 手写最小实现（GPT-2 c_attn，r=8）"
    cmd: "python learning/lora-family/src/lora_minimal.py"
    tier: V1
    v0: false
    gpu: true
  - id: lora-peft
    desc: "LoRA peft 调包对照（LoraConfig）"
    cmd: "python learning/lora-family/src/lora_peft.py"
    tier: V1
    v0: false
    gpu: true
  - id: lora-extensions
    desc: "rsLoRA / LoRA+ 扩展（scaling 公式 + 学习率比例）"
    cmd: "python learning/lora-family/src/lora_extensions.py"
    tier: V1
    v0: false
    gpu: true

  # ---- 02 AdaLoRA ----
  - id: adalora-minimal
    desc: "AdaLoRA 手写最小实现（SVD 形式 P Λ Qᵀ + 重要性分秩）"
    cmd: "python learning/lora-family/src/adalora_minimal.py"
    tier: V1
    v0: false
    gpu: true
  - id: adalora-peft
    desc: "AdaLoRA peft 调包对照（AdaLoraConfig）"
    cmd: "python learning/lora-family/src/adalora_peft.py"
    tier: V1
    v0: false
    gpu: true

  # ---- 03 PiSSA（+ OLoRA）----
  - id: pissa-minimal
    desc: "PiSSA 手写最小实现（W_0 的 SVD top-r 初始化）"
    cmd: "python learning/lora-family/src/pissa_minimal.py"
    tier: V1
    v0: false
    gpu: true
  - id: pissa-peft
    desc: "PiSSA / OLoRA peft 对照（init_lora_weights=pissa/olora）"
    cmd: "python learning/lora-family/src/pissa_peft.py"
    tier: V1
    v0: false
    gpu: true

  # ---- 04 VeRA ----
  - id: vera-minimal
    desc: "VeRA 手写最小实现（共享冻结 A/B，只学对角向量，r=256）"
    cmd: "python learning/lora-family/src/vera_minimal.py"
    tier: V1
    v0: false
    gpu: true
  - id: vera-peft
    desc: "VeRA peft 调包对照（VeraConfig）"
    cmd: "python learning/lora-family/src/vera_peft.py"
    tier: V1
    v0: false
    gpu: true

  # ---- 05 LoHa + LoKr ----
  - id: loha-minimal
    desc: "LoHa 手写最小实现（Hadamard 积分解，等效秩 r²）"
    cmd: "python learning/lora-family/src/loha_minimal.py"
    tier: V1
    v0: false
    gpu: true
  - id: lokr-minimal
    desc: "LoKr 手写最小实现（Kronecker 积分解）"
    cmd: "python learning/lora-family/src/lokr_minimal.py"
    tier: V1
    v0: false
    gpu: true
  - id: loha-lokr-peft
    desc: "LoHa/LoKr peft 兼容性 demo（GPT-2 Conv1D 预期 ValueError，仅 nn.Linear 支持）"
    cmd: "python learning/lora-family/src/loha_lokr_peft.py"
    tier: V1
    v0: false
    gpu: true

  # ---- NF4 共享量化模块（QLoRA/LoftQ 依赖）----
  - id: nf4-quant
    desc: "NF4 fake-quant 共享模块自测（纯数值，CPU 秒级）"
    cmd: "python learning/lora-family/src/nf4_quant.py"
    tier: V1
    v0: false
    gpu: false

  # ---- 06 QLoRA ----
  - id: qlora-minimal
    desc: "QLoRA 手写最小实现（NF4 fake-quant + LoRA，base 不更新，CPU/GPU 都跑）"
    cmd: "python learning/lora-family/src/qlora_minimal.py"
    tier: V1
    v0: false
    gpu: false
  - id: qlora-peft
    desc: "QLoRA peft + bitsandbytes 真 4-bit NF4（TinyLlama-1.1B，GPU only；失败 fail-fast，CPU 改跑 minimal）"
    cmd: "python learning/lora-family/src/qlora_peft.py"
    tier: V1
    v0: false
    gpu: true

  # ---- 07 LoftQ ----
  - id: loftq-minimal
    desc: "LoftQ 手写最小实现（量化感知的迭代 SVD 初始化，收敛单调下降）"
    cmd: "python learning/lora-family/src/loftq_minimal.py"
    tier: V1
    v0: false
    gpu: true
  - id: loftq-peft
    desc: "LoftQ peft 调包对照（init_lora_weights=loftq，需 scipy；失败 fail-fast）"
    cmd: "python learning/lora-family/src/loftq_peft.py"
    tier: V1
    v0: false
    gpu: true

  # ---- 08 DoRA ----
  - id: dora-minimal
    desc: "DoRA 手写最小实现（权重分解 magnitude × direction）"
    cmd: "python learning/lora-family/src/dora_minimal.py"
    tier: V1
    v0: false
    gpu: true
  - id: dora-peft
    desc: "DoRA peft 调包对照（use_dora=True）"
    cmd: "python learning/lora-family/src/dora_peft.py"
    tier: V1
    v0: false
    gpu: true
