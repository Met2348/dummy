# red-team-jailbreak 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules red-team-jailbreak
# cmd = README「实用入口」原文形态（repo-root 相对）。
# 这 9 个脚本全部无 argparse（纯 mock/toy 直跑 demo）→ v0: false（跳过 --help 探针，直接 smoke 直跑到完成）。
# test_redteam.py 聚合自测试归 V2（--tests）；verify_env.py 归 --env。
module: red-team-jailbreak
commands:
  - id: common-overview
    desc: "L01 红队历史 + Anthropic 框架工具箱（mock target / harm classifier / ASR）"
    cmd: "python learning/red-team-jailbreak/src/common.py"
    tier: V1
    v0: false
    gpu: false

  - id: gcg-minimal
    desc: "L03 GCG（Zou 2023）mock：随机 suffix 搜索攻击 mock target"
    cmd: "python learning/red-team-jailbreak/src/gcg_minimal.py"
    tier: V1
    v0: false
    gpu: false

  - id: gcg-original-minimal
    desc: "L03 GCG 论文算法形状：toy 可微目标上的真坐标梯度替换搜索（torch，CPU 即可）"
    cmd: "python learning/red-team-jailbreak/src/gcg_original_minimal.py"
    tier: V1
    v0: false
    gpu: false

  - id: pair-minimal
    desc: "L04 PAIR（Princeton 2024）mock：攻击者 LLM 用模板迭代重构 query"
    cmd: "python learning/red-team-jailbreak/src/pair_minimal.py"
    tier: V1
    v0: false
    gpu: false

  - id: autodan-minimal
    desc: "L05 AutoDAN（UMD 2023）mock：遗传算法变异 seed prompt"
    cmd: "python learning/red-team-jailbreak/src/autodan_minimal.py"
    tier: V1
    v0: false
    gpu: false

  - id: crescendo-demo
    desc: "L06 Crescendo（Microsoft 2024）mock：多轮渐进升级脚本"
    cmd: "python learning/red-team-jailbreak/src/crescendo_demo.py"
    tier: V1
    v0: false
    gpu: false

  - id: prompt-injection-demo
    desc: "L08 Prompt Injection：direct + indirect（工具输出隐藏注入）"
    cmd: "python learning/red-team-jailbreak/src/prompt_injection_demo.py"
    tier: V1
    v0: false
    gpu: false

  - id: jailbench-runner
    desc: "L11 JailbreakBench/HarmBench 风格标准化评测（4 攻击法 × target ASR）"
    cmd: "python learning/red-team-jailbreak/src/jailbench_runner.py"
    tier: V1
    v0: false
    gpu: false

  - id: red-team-matrix-capstone
    desc: "L12 Capstone：4 攻击 × 3 target ASR 矩阵红队报告卡"
    cmd: "python learning/red-team-jailbreak/src/red_team_matrix.py"
    tier: V1
    v0: false
    gpu: false
