# agent-graduation 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules agent-graduation
# 文档入口（README「运行验证」段 + L02-L06/L12-L14 讲义 + paper guide §18/§20）：
# 11 个直跑脚本 = dra/ 4 模块(planner/retriever/writer/verifier) + common + tools 共享库(6)
# + eval/ 3 个(tau_bench_mock/agent_eval_matter/dra_eval) + portfolio_v2，一一对应
# src/tests/test_graduation.py 的 11 项 MODULES 聚合清单。
# 全部无 argparse、纯 stdlib（无 torch/transformers/网络依赖）→ v0: false（跳过 --help 探针，直接 smoke 直跑）。
# dra_tools.file_write_tool 只写内存 dict（_IN_MEMORY_FS），orchestrator/dra_eval 的 __main__
# 额外打印 to_md() 报告；portfolio_v2 的 _self_test() 用相对临时文件名写后立即删除，均不落 repo。
# 1 个聚合测试（test_graduation.py）归 V2（--tests，pytest 收 0 用例→回退按脚本直跑，打印 11/11）；
# verify_env 归 --env（stdlib-only 检查，不进 runbook）。
module: agent-graduation
commands:
  - id: dra-common
    desc: "共享数据类型库 self-test：Plan/Note/Draft/Verified/DRACost（L08 成本模型实际所在文件）"
    cmd: "python learning/agent-graduation/src/dra/common.py"
    expect: "exit 0；打印 dra.common._self_test passed"
    tier: V1
    v0: false
    gpu: false

  - id: dra-tools
    desc: "L04 Tool stack：5 mock tool self-test（search/fetch/cite/file_write/python 沙箱 exec）"
    cmd: "python learning/agent-graduation/src/dra/tools/dra_tools.py"
    expect: "exit 0；打印 dra_tools._self_test passed"
    tier: V1
    v0: false
    gpu: false

  - id: dra-planner
    desc: "L03 DRA Planner：query → 5 条 sub-question 分解（关键词模板 + 通用兜底）"
    cmd: "python learning/agent-graduation/src/dra/planner.py"
    expect: "exit 0；打印 dra.planner._self_test passed"
    tier: V1
    v0: false
    gpu: false

  - id: dra-retriever
    desc: "DRA Retriever：per sub-question search+fetch 拼 Note"
    cmd: "python learning/agent-graduation/src/dra/retriever.py"
    expect: "exit 0；打印 dra.retriever._self_test passed"
    tier: V1
    v0: false
    gpu: false

  - id: dra-writer
    desc: "DRA Writer：notes 综合成带 [N] 引用的 markdown 报告"
    cmd: "python learning/agent-graduation/src/dra/writer.py"
    expect: "exit 0；打印 dra.writer._self_test passed"
    tier: V1
    v0: false
    gpu: false

  - id: dra-verifier
    desc: "DRA Verifier：逐 claim 关键词覆盖率判 supported/unsupported"
    cmd: "python learning/agent-graduation/src/dra/verifier.py"
    expect: "exit 0；打印 dra.verifier._self_test passed（含 supported/unsupported 计数）"
    tier: V1
    v0: false
    gpu: false

  - id: capstone1-dra
    desc: "L12 Capstone-1⭐⭐⭐⭐⭐⭐：planner→retriever→writer→verifier 4 模块串联，跑 LLM 推理优化 query 出 markdown 报告"
    cmd: "python learning/agent-graduation/src/dra/orchestrator.py"
    expect: "exit 0；self-test OK 后打印完整报告：5 sub-questions/≥3 citations/全部 claims supported/Verdict: [PASS]"
    tier: V1
    v0: false
    gpu: false

  - id: eval-tau-bench-mock
    desc: "L06 τ-bench mock：5 task（airline/retail/banking/support/research-report）+ mock agent 模拟器"
    cmd: "python learning/agent-graduation/src/eval/tau_bench_mock.py"
    expect: "exit 0；打印 eval.tau_bench_mock._self_test passed"
    tier: V1
    v0: false
    gpu: false

  - id: eval-agent-eval-matter
    desc: "paper guide 01 AI Agents That Matter 落地库：Pareto frontier / cost-controlled score / holdout-by-generality / NovelQA 成本对照"
    cmd: "python learning/agent-graduation/src/eval/agent_eval_matter.py"
    expect: "exit 0；打印 eval.agent_eval_matter._self_test passed"
    tier: V1
    v0: false
    gpu: false

  - id: capstone2-tau-bench
    desc: "L13 Capstone-2⭐⭐⭐⭐⭐⭐：5 task × 5 dim(goal/tool_use/safety/efficiency/cost) 评分表，research-report 任务复用 Capstone-1 DRA"
    cmd: "python learning/agent-graduation/src/eval/dra_eval.py"
    expect: "exit 0；self-test OK 后打印 5×5 表 + Overall mean + Verdict: [PASS]（overall mean > 0.5）"
    tier: V1
    v0: false
    gpu: false

  - id: capstone3-portfolio-v2
    desc: "L14 Capstone-3⭐⭐⭐⭐⭐⭐⭐：汇总 39 专题 Timeline + 6-ckpt zoo + 全部 Capstone + 4 选型树 + 6 大画像 + 5 career path，落盘 portfolio_v2.md"
    cmd: "python learning/agent-graduation/src/portfolio_v2.py"
    expect: "exit 0；打印 self-test passed（39 topics enumerated）+ 写出系统临时目录下的 portfolio_v2.md（不落 repo）"
    tier: V1
    v0: false
    gpu: false
