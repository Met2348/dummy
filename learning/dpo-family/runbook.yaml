# dpo-family 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules dpo-family \
#         --json-out docs/local-env/ERIC-3080Ti-runbook-results.json \
#         --md-out docs/local-env/ERIC-3080Ti-runbook-matrix.md
# cmd = README/lecture「入口」原文形态（repo-root 相对）。smoke = 验证器实际跑的最小预算。
# 注：pytest 测试套件归 V2（--tests）；verify_env 归 --env；均不在此重复。
#
# 重要：本模块**无 trl 依赖**——DPO/IPO/KTO/ORPO/SimPO/CPO/DPOP/RainbowPO 全是手写
# 张量级 loss（log-ratio of policy vs ref），不踩 trl 1.5.x DPOTrainer/DPOConfig 漂移坑。
# 仅 dpo_minimal.py 真起 transformers 模型 + datasets(Anthropic/hh-rlhf)；其余 8 个是
# 纯数值 self-test demo（torch only，秒级，无网络、无 argparse → v0:false）。
# 排除 official/repos/direct-preference-optimization 子模块（不收录、不运行）。
module: dpo-family
commands:
  - id: dpo-train
    desc: "手写 DPO：GPT-2 actor+ref，Anthropic-HH 偏好对，真实 log-ratio DPO 训练"
    cmd: "python learning/dpo-family/src/dpo_minimal.py --n-train {ntrain} --epochs {epochs} --max-length {maxlen} --log-interval {logint}"
    full:  { ntrain: 200, epochs: 1, maxlen: 256, logint: 20 }
    smoke: { ntrain: 8, epochs: 1, maxlen: 64, logint: 4 }
    expect: "exit 0；打印每 log-interval 步 loss(≈log2 起步) + margin；数据集 Anthropic/hh-rlhf 命名空间 id（已缓存，离线可加载，失败回退 dummy 仍真训）"
    tier: V1
    v0: true
    gpu: true

  - id: ipo-demo
    desc: "IPO（Identity-PO）：squared loss 在高 margin 饱和，对比 DPO 持续推"
    cmd: "python learning/dpo-family/src/ipo_minimal.py"
    expect: "exit 0；打印 margin +1/+4/+20 处 DPO vs IPO loss（IPO 二次发散）"
    tier: V1
    v0: false
    gpu: false

  - id: kto-demo
    desc: "KTO（Kahneman-Tversky）：单边 desired/undesired 标签，前景理论非对称 loss"
    cmd: "python learning/dpo-family/src/kto_minimal.py"
    expect: "exit 0；打印 desired count + KTO loss"
    tier: V1
    v0: false
    gpu: false

  - id: simpo-demo
    desc: "SimPO：length-normalized reward + 无 ref model，避免长度偏置"
    cmd: "python learning/dpo-family/src/simpo_minimal.py"
    expect: "exit 0；打印 SimPO loss（length-norm 后短长 response 等价）"
    tier: V1
    v0: false
    gpu: false

  - id: cpo-demo
    desc: "CPO（Contrastive PO）：SFT NLL + λ·DPO-style 对比（actor 自代 ref）"
    cmd: "python learning/dpo-family/src/cpo_minimal.py"
    expect: "exit 0；打印 CPO loss（> SFT 基线）"
    tier: V1
    v0: false
    gpu: false

  - id: dpop-demo
    desc: "DPOP：DPO + hinge 惩罚 chosen 概率下降（修 DPO chosen-logp drop 反例）"
    cmd: "python learning/dpo-family/src/dpop_minimal.py"
    expect: "exit 0；打印 DPO-alone vs DPOP loss（hinge 项放大惩罚）"
    tier: V1
    v0: false
    gpu: false

  - id: orpo-demo
    desc: "ORPO（Odds Ratio PO）：log-odds 比替代 log π/π_ref，SFT + λ·OR，无 ref"
    cmd: "python learning/dpo-family/src/orpo_minimal.py"
    expect: "exit 0；打印 ORPO loss（含数值稳定 log_odds）"
    tier: V1
    v0: false
    gpu: false

  - id: rainbowpo
    desc: "RainbowPO 统一公式：一个 unified_po_loss + POConfig = 6 个变体全覆盖"
    cmd: "python learning/dpo-family/src/rainbowpo.py"
    expect: "exit 0；打印 6 变体 (use_ref/len_norm/loss_type/sft) × L_total/margin 表"
    tier: V1
    v0: false
    gpu: false

  - id: capstone-compare
    desc: "Capstone：6 PO 变体同基座同数据 50 步横向 benchmark（loss/margin/Δchosen_logp）"
    cmd: "python learning/dpo-family/src/capstone_dpo_comparison.py"
    expect: "exit 0；打印 6 方法 final_loss/final_margin/Δchosen_logp 表 + 观察结论"
    tier: V1
    v0: false
    gpu: false
