# agent-memory-context 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules agent-memory-context
# 文档入口（README 总览表 L01-L12 对应的 11 个 src 脚本 + common 共享后端
#   + memgpt_virtual_context.py，后者是 paper/guide_01_memgpt.md §15.2/§16 补的 toy
#   实现，README 总览表原漏列，本轮已补）：
# 全是手写 memory 数据结构 mock（LRU archive / KG triples / KV block 分配 / prompt cache
#   TTL 等），纯 stdlib（hashlib/math/re/dataclasses），CPU 秒级，无外部依赖。
# 这些脚本全部无 argparse → v0: false（跳过 --help 探针，直接 smoke 直跑）。
# 每个脚本 __main__ = 跑内置 _self_test()（真断言，非 print-only）；capstone 额外打印完整 markdown 报告。
# harness 给每个模块设 PYTHONPATH=src，故裸导入（如 `from common import ...`）可解析；
# 命令用 repo-root 相对路径（Python 会把脚本自身所在目录插入 sys.path[0]，故也可脱离 harness 直接跑）。
# src/tests/test_memory.py 是聚合测试跑手（无 pytest test_ 函数）归 V2（--tests，
# pytest collect-0 → 回退按脚本直跑，13/13 真断言）；environment/verify_env.py 归 --env。
module: agent-memory-context
commands:
  # --- 共享后端（非独立 lecture，被其余全部脚本依赖）
  - id: common-selftest
    desc: "共享后端 self-test（blake2b 稳定哈希 embedding / cosine / mock_now / tokenize）"
    cmd: "python learning/agent-memory-context/src/common.py"
    tier: V1
    v0: false
    gpu: false

  - id: letta-mock
    desc: "L02 Letta(前 MemGPT) self-test（main context: core+recent + archival memory 溢出转存）"
    cmd: "python learning/agent-memory-context/src/letta_mock.py"
    tier: V1
    v0: false
    gpu: false

  - id: memgpt-virtual-context
    desc: "L02 补充：MemGPT 论文 virtual context toy（warning/flush/recursive-summary + nested-KV chaining + pagination，见 paper/guide_01_memgpt.md）"
    cmd: "python learning/agent-memory-context/src/memgpt_virtual_context.py"
    tier: V1
    v0: false
    gpu: false

  - id: mem0-mock
    desc: "L03 Mem0 self-test（extract_facts 正则抽取 + decide_action ADD/UPDATE/NONE）"
    cmd: "python learning/agent-memory-context/src/mem0_mock.py"
    tier: V1
    v0: false
    gpu: false

  - id: vector-store
    desc: "L04 向量库 self-test（upsert/search/delete + metadata filter_fn）"
    cmd: "python learning/agent-memory-context/src/vector_store.py"
    tier: V1
    v0: false
    gpu: false

  - id: episodic-memory
    desc: "L05 Episodic memory self-test（带时间戳事件存储 + user/time-range 过滤检索）"
    cmd: "python learning/agent-memory-context/src/episodic_memory.py"
    tier: V1
    v0: false
    gpu: false

  - id: semantic-memory
    desc: "L06 Semantic memory self-test（KG triples add/update + multi-hop 查询）"
    cmd: "python learning/agent-memory-context/src/semantic_memory.py"
    tier: V1
    v0: false
    gpu: false

  - id: context-mgmt
    desc: "L07 Context 管理 self-test（sliding-window / importance-prune / rolling-summary / rag-history）"
    cmd: "python learning/agent-memory-context/src/context_mgmt.py"
    tier: V1
    v0: false
    gpu: false

  - id: prompt-cache
    desc: "L08 Prompt caching self-test（TTL 缓存命中/未命中 + Anthropic 定价 cost_estimate）"
    cmd: "python learning/agent-memory-context/src/prompt_cache.py"
    tier: V1
    v0: false
    gpu: false

  - id: kv-cache-mock
    desc: "L09 KV-cache self-test（PagedAttention 风格 block 分配 + share_prefix 前缀共享 + free_seq 回收）"
    cmd: "python learning/agent-memory-context/src/kv_cache_mock.py"
    tier: V1
    v0: false
    gpu: false

  - id: long-conv
    desc: "L10 长对话 self-test（4 层架构：recent + rolling-summary + core-facts，滚动合并摘要）"
    cmd: "python learning/agent-memory-context/src/long_conv.py"
    tier: V1
    v0: false
    gpu: false

  - id: personalization
    desc: "L11 个性化 memory self-test（偏好/知识水平/风格档案 + 点赞点踩反馈更新 style）"
    cmd: "python learning/agent-memory-context/src/personalization.py"
    tier: V1
    v0: false
    gpu: false

  - id: capstone-memory-chat
    desc: "L12 Capstone：3-layer memory chatbot（10-turn 对话，Turn 10 从 semantic profile 召回 Turn 1 偏好），打印完整 markdown 报告"
    cmd: "python learning/agent-memory-context/src/capstone_memory_chat.py"
    tier: V1
    v0: false
    gpu: false
