# speculative-decoding 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules speculative-decoding
#
# ⚠️ 本模块 11 个 src 脚本里**只有 2 个有 __main__**（capstone_eagle3 / speculative_original_minimal）。
# 其余 9 个（classic_spec_decode / eagle_minimal / eagle2 / medusa_heads / lookahead /
# self_spec / tree_attention / spec_eval / common）是**库模块**：直接 `python X.py` 会
# 无输出 exit 0（no-op，已实测 stdout_len=0）。它们由 pytest 覆盖 → 归 V2（`--tests`），
# **绝不**登记为可直跑 demo（那是假成功坑#4）。
#
# 这 2 个脚本均无 argparse（v0: false → 跳过 --help 探针，直接 smoke 直跑）；纯手写合成张量
# toy，无真模型加载，CPU 秒级。真模型 benchmark（Qwen-1.5B+0.5B via vLLM spec-decode）见
# README，需独立 vllm 栈，不在 runbook（本机重型可选栈）。
module: speculative-decoding
commands:
  - id: capstone-eagle3
    desc: "Capstone：classic/medusa/eagle1/eagle2 × 5 任务 合成对照（真实 accept/MAU/sim_speedup 表）"
    cmd: "python learning/speculative-decoding/src/capstone_eagle3.py"
    expect: "exit 0；打印 4 method × 5 task 的 accept/MAU/sim_speedup markdown 表 + JSON"
    tier: V1
    v0: false
    gpu: false

  - id: spec-original-minimal
    desc: "经典投机采样论文级 toy：证明 exact_output == target（零 bias）+ overlap α + 最优 γ/加速比"
    cmd: "python learning/speculative-decoding/src/speculative_original_minimal.py"
    expect: "exit 0；exact_output_distribution == target_distribution；自检 passed"
    tier: V1
    v0: false
    gpu: false
