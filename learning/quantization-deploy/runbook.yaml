# quantization-deploy 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules quantization-deploy
# cmd = README「运行验证」原文形态（repo-root 相对）。
#
# ⚠️ 本模块 10 个 src 脚本里**只有 2 个有 __main__**（capstone_quant_zoo、
# gptq_original_minimal）→ runbook 只登记这 2 个可直跑入口。
# 其余 8 个（int8_basics / bnb_int4 / gptq_minimal / awq_minimal / smooth_quant /
# fp8_demo / kv_quant / quant_eval）是**库模块**（无 __main__，直跑 = no-op exit0
# 假成功＝坑#4）→ 不登记为 demo；它们由 src/tests/test_quant.py 在 V2(--tests) 覆盖。
# capstone_quant_zoo 现在会真正调用其中 6 个量化器并算出真实重建误差/压缩比。
#
# 测试套件归 V2（--tests），不在此重复。verify_env 用 --env 验证。
# 两个入口都是纯 CPU 数值 self-test（无 argparse、无 GPU、秒级）。
module: quantization-deploy
commands:
  - id: capstone-quant-zoo
    desc: "量化动物园：单层 toy 上真跑 int8/GPTQ/AWQ/NF4/FP8/SmoothQuant，算真实重建MSE+压缩比+显存"
    cmd: "python learning/quantization-deploy/src/capstone_quant_zoo.py"
    expect: "exit 0；打印 7 行对照表，每行真实 recon-MSE（fp16=0，8bit<4bit，GPTQ<NF4）"
    tier: V1
    v0: false
    gpu: false

  - id: gptq-original-minimal
    desc: "GPTQ 论文形态最小实现：Hessian(X^TX)+逐列量化+误差补偿 vs 朴素 RTN 对照"
    cmd: "python learning/quantization-deploy/src/gptq_original_minimal.py"
    expect: "exit 0；打印 naive_mse / gptq_mse（gptq_mse <= naive_mse），self-test passed"
    tier: V1
    v0: false
    gpu: false
