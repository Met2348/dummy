# rl-foundations 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules rl-foundations
# cmd = README「实用入口」原文形态（repo-root 相对）。smoke = 验证器实际跑的最小预算。
# 注：pytest 测试套件归 V2，用 `--tests` 验证，不在此重复。verify_env 用 `--env` 验证。
module: rl-foundations
commands:
  - id: cartpole-reinforce
    desc: "CartPole REINFORCE 横向"
    cmd: "python learning/rl-foundations/src/cartpole_full.py --algo reinforce --total-steps {steps}"
    full:  { steps: 30000 }
    smoke: { steps: 1500 }
    expect: "exit 0；打印 episode reward"
    tier: V1
    gpu: false

  - id: cartpole-a2c
    desc: "CartPole A2C"
    cmd: "python learning/rl-foundations/src/cartpole_full.py --algo a2c --total-steps {steps}"
    full:  { steps: 30000 }
    smoke: { steps: 1500 }
    expect: "exit 0"
    tier: V1
    gpu: false

  - id: cartpole-trpo
    desc: "CartPole TRPO"
    cmd: "python learning/rl-foundations/src/cartpole_full.py --algo trpo --total-steps {steps}"
    full:  { steps: 30000 }
    smoke: { steps: 1500 }
    expect: "exit 0"
    tier: V1
    gpu: false

  - id: cartpole-ppo
    desc: "CartPole PPO（核心）"
    cmd: "python learning/rl-foundations/src/cartpole_full.py --algo ppo --total-steps {steps}"
    full:  { steps: 30000 }
    smoke: { steps: 1500 }
    expect: "exit 0；mean reward 随 step 上升"
    tier: V1
    gpu: false

  - id: cartpole-sb3-ppo
    desc: "CartPole stable-baselines3 PPO 对照"
    cmd: "python learning/rl-foundations/src/cartpole_full.py --algo sb3_ppo --total-steps {steps}"
    full:  { steps: 30000 }
    smoke: { steps: 2000 }
    expect: "exit 0"
    tier: V1
    gpu: false

  - id: capstone-imdb-ppo
    desc: "Capstone：GPT-2 + IMDb + SST-2 RM + PPO（trl 经典 API 不在时回退手写 PPO）"
    cmd: "python learning/rl-foundations/src/capstone_imdb_ppo.py --total-iters {iters} --batch-size {bs} --n-prompts {nprompts}"
    full:  { iters: 30, bs: 4, nprompts: 1000 }
    smoke: { iters: 2, bs: 4, nprompts: 32 }
    expect: "exit 0；打印每 iter mean_R(pos-prob)；full 跑时上升"
    tier: V1
    gpu: true
