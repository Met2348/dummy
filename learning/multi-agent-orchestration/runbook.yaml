# multi-agent-orchestration 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules multi-agent-orchestration
# 文档入口（README 总览表 L01-L13 对应的 12 个 src 脚本 + 共享 common.py + L01 前置 camel_role_play.py）：
# 全是手写多 agent 编排范式 mock（AutoGen/CrewAI/LangGraph/MetaGPT/Magentic-One/Swarm 等），纯 stdlib，CPU 秒级，无外部依赖。
# 这些脚本全部无 argparse → v0: false（跳过 --help 探针，直接 smoke 直跑）。
# 每个脚本 __main__ = 跑内置 _self_test()（真断言，非 print-only）；capstone 额外打印完整 crew 报告 markdown。
# harness 给每个模块设 PYTHONPATH=src，故裸导入（如 `from common import CostTracker`）可解析；
# 命令用 repo-root 相对路径（Python 会把脚本自身所在目录插入 sys.path[0]，故也可脱离 harness 直接跑）。
# src/tests/test_multi_agent.py 是聚合测试跑手（无 pytest test_ 函数）归 V2（--tests，
# pytest collect-0 → 回退按脚本直跑，14/14 真断言）；environment/verify_env.py 归 --env。
module: multi-agent-orchestration
commands:
  # --- 共享后端（非独立 lecture，被 camel_role_play/capstone 等依赖）
  - id: common-selftest
    desc: "共享后端 self-test（AgentMessage/AgentReply/CostTracker/mock pattern-agent）"
    cmd: "python learning/multi-agent-orchestration/src/common.py"
    tier: V1
    v0: false
    gpu: false

  - id: camel-role-play
    desc: "L01 前置：CAMEL role-play 双 agent 先驱 self-test（inception prompting + 失败模式检测，见 paper/guide_01_camel.md）"
    cmd: "python learning/multi-agent-orchestration/src/camel_role_play.py"
    tier: V1
    v0: false
    gpu: false

  - id: autogen-mock
    desc: "L02 AutoGen ConversableAgent + GroupChat self-test"
    cmd: "python learning/multi-agent-orchestration/src/autogen_mock.py"
    tier: V1
    v0: false
    gpu: false

  - id: crewai-mock
    desc: "L03 CrewAI Agent/Task/Crew（sequential + hierarchical）self-test"
    cmd: "python learning/multi-agent-orchestration/src/crewai_mock.py"
    tier: V1
    v0: false
    gpu: false

  - id: langgraph-mock
    desc: "L04 LangGraph StateGraph（reducer + conditional edge + checkpoint）self-test"
    cmd: "python learning/multi-agent-orchestration/src/langgraph_mock.py"
    tier: V1
    v0: false
    gpu: false

  - id: metagpt-mock
    desc: "L05 MetaGPT SOP pipeline（PM→Architect→Engineer→QA）self-test"
    cmd: "python learning/multi-agent-orchestration/src/metagpt_mock.py"
    tier: V1
    v0: false
    gpu: false

  - id: magentic-one-mock
    desc: "L06 Magentic-One Orchestrator + Task/Progress ledger self-test"
    cmd: "python learning/multi-agent-orchestration/src/magentic_one_mock.py"
    tier: V1
    v0: false
    gpu: false

  - id: swarm-mock
    desc: "L07 OpenAI Swarm hand-off（函数返回触发转移）self-test"
    cmd: "python learning/multi-agent-orchestration/src/swarm_mock.py"
    tier: V1
    v0: false
    gpu: false

  - id: debate
    desc: "L08 Debate pattern（多轮批评 + 多数投票裁决）self-test"
    cmd: "python learning/multi-agent-orchestration/src/debate.py"
    tier: V1
    v0: false
    gpu: false

  - id: hierarchical
    desc: "L09 Hierarchical（supervisor 关键词路由 + N worker）self-test"
    cmd: "python learning/multi-agent-orchestration/src/hierarchical.py"
    tier: V1
    v0: false
    gpu: false

  - id: message-bus
    desc: "L10 Pub-sub 消息总线 self-test"
    cmd: "python learning/multi-agent-orchestration/src/message_bus.py"
    tier: V1
    v0: false
    gpu: false

  - id: conflict-resolution
    desc: "L11 冲突消解（majority/weighted/tie-break/borda/judge）self-test"
    cmd: "python learning/multi-agent-orchestration/src/conflict_resolution.py"
    tier: V1
    v0: false
    gpu: false

  - id: cost-analyzer
    desc: "L12 Multi-agent 成本分析（单 vs 多 agent token 爆炸对比）self-test"
    cmd: "python learning/multi-agent-orchestration/src/cost_analyzer.py"
    tier: V1
    v0: false
    gpu: false

  - id: capstone-coding-crew
    desc: "L13 Capstone：3-agent hierarchical coding crew（PM+Engineer+Reviewer 完成 FizzBuzz），打印完整报告 md"
    cmd: "python learning/multi-agent-orchestration/src/capstone_coding_crew.py"
    tier: V1
    v0: false
    gpu: false
