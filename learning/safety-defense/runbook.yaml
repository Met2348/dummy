# safety-defense 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules safety-defense
# cmd = README「实用入口」原文形态（repo-root 相对）。
# 这 10 个脚本全部无 argparse（纯 mock/toy 直跑 demo，stdlib-only，无 torch/transformers）
# → v0: false（跳过 --help 探针，直接 smoke 直跑到完成）。
# test_defense.py 聚合自测试归 V2（--tests）；verify_env.py 归 --env。
module: safety-defense
commands:
  - id: common-overview
    desc: "L01 防御 4 层结构：harm 关键词分类 + confusion matrix / precision-recall 工具"
    cmd: "python learning/safety-defense/src/common.py"
    tier: V1
    v0: false
    gpu: false

  - id: llama-guard-mock
    desc: "L02 Llama Guard 3（Meta）mock：input/output 9 类 harm 关键词分类器"
    cmd: "python learning/safety-defense/src/llama_guard_mock.py"
    tier: V1
    v0: false
    gpu: false

  - id: llama-guard-original-minimal
    desc: "L02 Llama Guard 论文（Inan 2023）形状：O1-O6 原始分类taxonomy + prompt/response 分任务 + safe/unsafe\\nOi 输出格式 + 1-vs-all 逐类打分"
    cmd: "python learning/safety-defense/src/llama_guard_original_minimal.py"
    tier: V1
    v0: false
    gpu: false

  - id: wildguard-mock
    desc: "L04 WildGuard（AI2 2024）mock：关键词 + 对抗模式（ignore previous 等）双通道检测"
    cmd: "python learning/safety-defense/src/wildguard_mock.py"
    tier: V1
    v0: false
    gpu: false

  - id: nemo-guardrails-mock
    desc: "L05 NeMo Guardrails（NVIDIA）mock：rule-based rails（refuse/redirect/sanitize/allow）"
    cmd: "python learning/safety-defense/src/nemo_guardrails_mock.py"
    tier: V1
    v0: false
    gpu: false

  - id: constitutional-classifier
    desc: "L06 Constitutional Classifiers（Anthropic 2025⭐）mock：constitution 规则 + 对抗覆盖 fictional-context 检测"
    cmd: "python learning/safety-defense/src/constitutional_classifier.py"
    tier: V1
    v0: false
    gpu: false

  - id: prompt-injection-defense
    desc: "L07 Prompt Injection 防御：隐藏文本剥离（HTML注释/display:none）+ 注入关键词检测 + privilege-sandwich prompt 构造"
    cmd: "python learning/safety-defense/src/prompt_injection_defense.py"
    tier: V1
    v0: false
    gpu: false

  - id: pii-redaction
    desc: "L09 PII 检测 + 脱敏：email/phone/SSN/信用卡/IPv4 正则 + toy 姓名 NER"
    cmd: "python learning/safety-defense/src/pii_redaction.py"
    tier: V1
    v0: false
    gpu: false

  - id: safety-eval-runner
    desc: "L11 安全 bench：任意 guard 函数在 benign/harmful/injection 测试集上的 precision/recall/F1"
    cmd: "python learning/safety-defense/src/safety_eval_runner.py"
    tier: V1
    v0: false
    gpu: false

  - id: defense-pipeline-capstone
    desc: "L12 Capstone：4 层防御流水线（PII脱敏→NeMo rails→constitutional分类→注入检测→output guard），no_defense vs 4-layer 的 precision/recall/F1 对照"
    cmd: "python learning/safety-defense/src/defense_pipeline.py"
    tier: V1
    v0: false
    gpu: false
