# reasoning-eval 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules reasoning-eval
# 文档入口（README 总览表的 10 个 src 脚本）：全是无参直跑 demo。
# 这些脚本无 argparse → v0: false（跳过 --help 探针，直接 smoke 直跑）。
# 全部纯 CPU 手写 mock（无重型 import），秒级完成；gpu: false。
# self-test 跑完后各脚本 _demo() 打印真实 acc / 验证结果（非硬编码分数）。
# 10 个一致性测试归 V2（--tests，见 src/tests/test_reasoning.py）；verify_env 归 --env。
module: reasoning-eval
commands:
  - id: common
    desc: "共享工具库：答案抽取 / 数值等价 / pass@k 自测 + demo"
    cmd: "python learning/reasoning-eval/src/common.py"
    tier: V1
    v0: false
    gpu: false
  - id: gsm8k-runner
    desc: "GSM8K runner：mock 题真算 acc（dummy→0 / oracle→1）"
    cmd: "python learning/reasoning-eval/src/gsm8k_runner.py"
    tier: V1
    v0: false
    gpu: false
  - id: math-runner
    desc: "MATH runner：\\boxed{} 抽取 + 真算 acc + 按难度分桶"
    cmd: "python learning/reasoning-eval/src/math_runner.py"
    tier: V1
    v0: false
    gpu: false
  - id: aime-runner
    desc: "AIME runner：整数精确匹配 + pass@k"
    cmd: "python learning/reasoning-eval/src/aime_runner.py"
    tier: V1
    v0: false
    gpu: false
  - id: math-verify
    desc: "数学答案验证 demo：1/2==0.5==\\frac{1}{2}==50% 真等价判断（regex+Fraction，非 sympy）"
    cmd: "python learning/reasoning-eval/src/math_verify_demo.py"
    tier: V1
    v0: false
    gpu: false
  - id: gpqa-runner
    desc: "GPQA Diamond runner：多选字母抽取 + 真算 acc"
    cmd: "python learning/reasoning-eval/src/gpqa_runner.py"
    tier: V1
    v0: false
    gpu: false
  - id: hle-mock
    desc: "Humanity's Last Exam mock runner：短答 gold-substring 判分"
    cmd: "python learning/reasoning-eval/src/hle_mock.py"
    tier: V1
    v0: false
    gpu: false
  - id: zebra-logic
    desc: "ZebraLogic runner：约束谜题判分（注：是 benchmark runner 判模型答案，非内嵌求解器）"
    cmd: "python learning/reasoning-eval/src/zebra_logic.py"
    tier: V1
    v0: false
    gpu: false
  - id: tool-aug-math
    desc: "工具增强数学（PoT）：模型出代码→沙箱执行→对比纯 CoT（tool 1.00 vs CoT 0.00）"
    cmd: "python learning/reasoning-eval/src/tool_aug_math.py"
    tier: V1
    v0: false
    gpu: false
  - id: capstone-reasoning-compare
    desc: "Capstone：2 mock 模型 × 5 bench 对照表（baseline 0.00 vs r1_tiny 1.00）"
    cmd: "python learning/reasoning-eval/src/capstone_reasoning_compare.py"
    tier: V1
    v0: false
    gpu: false
