# cluster-networking 文档入口命令清单（runbook）
# 验证：.venv/Scripts/python.exe scripts/eric_3080ti_env_audit.py --runbook --modules cluster-networking
# 文档入口：lectures/06-capstone.md 明确给出 capstone_cluster_sim.py 跑法；paper/guide_01_demystifying_nccl.md
#   §16 给出 nccl_original_minimal.py + tests/test_all.py 跑法；其余 5 个 src 脚本（common/fabric_topology/
#   allreduce_algos/nccl_collectives/sharp_inline）无 lecture 显式 python 命令，但均有 __main__ 直跑
#   self-test，按惯例（同 gpu-architecture/cuda-essentials/kernel-engineering）一并登记。
# 全部 7 个脚本均无 argparse（grep -nE "add_argument|ArgumentParser|__main__" src/*.py 只命中 __main__，
#   零 add_argument/ArgumentParser）→ v0: false（跳过 --help 探针，直接 smoke 直跑）。无可调预算参数 →
#   无 full/smoke 字段。
# import 情况：common.py/fabric_topology.py 只用 dataclasses+__future__；其余 5 个脚本互相
#   `from common import Link` / `from allreduce_algos import ring_allreduce, ...` 跨文件 import（同
#   gpu-architecture/cuda-essentials 模式）。已实测直接 `python learning/cluster-networking/src/X.py`
#   （不设 PYTHONPATH）可行：Python 自动把脚本所在目录插入 sys.path[0]，同目录 common.py 等能正常 import。
# 全部脚本仅纯 stdlib（dataclasses/math）计算，CPU 秒级，无需 GPU、无需装包、无网络依赖。
# 没有 environment/ 目录、没有 verify_env.py（--env 对本模块 N/A）。
# src/tests/test_all.py 只有 def main()，无 test_ 前缀函数 → pytest 下 collect-0（rc=5），harness
#   `_run_test_command` 会自动回退直接 `python tests/test_all.py` 执行（已实测 7/7 passed），归 V2
#   （--tests），不在此重复登记。
module: cluster-networking
commands:
  - id: common
    desc: "Link 数据类 + 7 种互连(PCIe/NVLink4/NVLink5/IB-NDR/IB-XDR/RoCE/Eth) 传输时延 self-test"
    cmd: "python learning/cluster-networking/src/common.py"
    tier: V1
    v0: false
    gpu: false
  - id: fabric-topology
    desc: "Fat-tree(3-tier bisection BW/switch数) + Dragonfly(avg hops) self-test"
    cmd: "python learning/cluster-networking/src/fabric_topology.py"
    tier: V1
    v0: false
    gpu: false
  - id: allreduce-algos
    desc: "ring/tree/halving-doubling 三种 all-reduce 算法时延模型 + NCCL 启发式算法选择器 self-test"
    cmd: "python learning/cluster-networking/src/allreduce_algos.py"
    tier: V1
    v0: false
    gpu: false
  - id: nccl-collectives
    desc: "all_gather/reduce_scatter/all_reduce/broadcast/all_to_all 五个 collective 时延模型 self-test"
    cmd: "python learning/cluster-networking/src/nccl_collectives.py"
    tier: V1
    v0: false
    gpu: false
  - id: sharp-inline
    desc: "SHARP in-network reduction(交换机内 ALU 聚合) vs ring 加速比 self-test"
    cmd: "python learning/cluster-networking/src/sharp_inline.py"
    tier: V1
    v0: false
    gpu: false
  - id: nccl-original-minimal
    desc: "复现《Demystifying NCCL》论文的 protocol(Simple/LL/LL128)+channel+algorithm(ring/tree) 选择模型 self-test"
    cmd: "python learning/cluster-networking/src/nccl_original_minimal.py"
    tier: V1
    v0: false
    gpu: false
  - id: capstone-cluster-sim
    desc: "Capstone：70B 模型 140GB BF16 梯度在 4 种(集群规模,互连)组合下对比 ring/halving-doubling/SHARP 选最优算法"
    cmd: "python learning/cluster-networking/src/capstone_cluster_sim.py"
    tier: V1
    v0: false
    gpu: false
