# agent-code-eval 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules agent-code-eval
# 文档入口（README 总览表的 8 个 src 脚本）：全是无参直跑 demo。
# 这些脚本无 argparse → v0: false（跳过 --help 探针，直接 smoke 直跑）。
# 全部纯 CPU 手写 mock + 真 exec() 评测（无重型 import），秒级完成；gpu: false。
# self-test 跑完后各脚本 _demo() 打印真实逐样本评分（empty→0 / oracle→1，非硬编码分数）。
# humaneval/mbpp/livecodebench/swebench 是真 exec() 候选代码对拍 hidden tests（common.safe_exec
#   受限 __builtins__ + 禁止模式黑名单）；webarena 是真状态机；bfcl 是真 JSON 解析+对比。
# 8 个一致性测试归 V2（--tests，见 src/tests/test_agent.py）；verify_env 归 --env。
module: agent-code-eval
commands:
  - id: common
    desc: "共享库：代码块抽取 / 受限沙箱 safe_exec / pass@k 聚合 自测 + demo"
    cmd: "python learning/agent-code-eval/src/common.py"
    tier: V1
    v0: false
    gpu: false
  - id: humaneval-runner
    desc: "HumanEval runner：真 exec() 候选代码对拍 hidden tests 算 pass@1/pass@k（empty→0 / oracle→1）"
    cmd: "python learning/agent-code-eval/src/humaneval_runner.py"
    tier: V1
    v0: false
    gpu: false
  - id: mbpp-runner
    desc: "MBPP runner：真 exec() 候选代码对拍 3 测试用例算 pass@1（empty→0 / oracle→1）"
    cmd: "python learning/agent-code-eval/src/mbpp_runner.py"
    tier: V1
    v0: false
    gpu: false
  - id: livecodebench-mock
    desc: "LiveCodeBench mock：真 exec() 3 道算法题（two_sum/valid_parens/Kadane）对拍 hidden tests"
    cmd: "python learning/agent-code-eval/src/livecodebench_mock.py"
    tier: V1
    v0: false
    gpu: false
  - id: swebench-mock
    desc: "SWE-Bench mock：真 exec() 修复后文件对拍 hidden test（buggy→fail / fixed→pass）"
    cmd: "python learning/agent-code-eval/src/swebench_mock.py"
    tier: V1
    v0: false
    gpu: false
  - id: webarena-mock
    desc: "WebArena mock：真状态机（动作逐条改 ShopState）+ 终态对比目标（空→fail / 正确脚本→pass）"
    cmd: "python learning/agent-code-eval/src/webarena_mock.py"
    tier: V1
    v0: false
    gpu: false
  - id: bfcl-runner
    desc: "BFCL function-calling：真 JSON 解析 + 选对函数&参数判分（空→0 / 正确 JSON→1）"
    cmd: "python learning/agent-code-eval/src/bfcl_runner.py"
    tier: V1
    v0: false
    gpu: false
  - id: mini-agent-capstone
    desc: "Capstone：mock 模型 × 5 bench 评测聚合表（empty→全0 / smart→全1，真跑各 runner）"
    cmd: "python learning/agent-code-eval/src/mini_agent.py"
    tier: V1
    v0: false
    gpu: false
