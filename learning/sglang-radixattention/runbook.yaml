# sglang-radixattention 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules sglang-radixattention
# cmd = README「运行」/讲义原文形态（repo-root 相对）。smoke = 验证器实际跑的最小预算。
#
# 性质：系统/工程教学模块（从零手写 SGLang 的 RadixAttention 机制）。9 个 src 脚本
#   全部是**纯 CPU / 纯数值**演示，全部有 __main__、全部无 argparse → 一律 v0: false 直跑。
#   秒级 PASS 是真实计算（已逐一核 stdout，非 no-op）：
#     - radix_tree：真 radix 前缀匹配 + segment 分裂 + refcount/LRU 淘汰；matched/分裂/hit_rate 真实。
#     - jump_forward：沿 FSM「唯一合法字符」确定边逐字符跳跃（真 jump-forward，非占位），
#       在 {"name":"\d{4}} 上正确强制前缀 9 字符后停在 \d{4} 分支。
#     - grammar_fsm / constrained_sampler：真 FSM 接受判定 + 真 logit mask（commit 后 mask 随状态变化）。
#     - agent_server (Capstone)：**进程内 32-agent 并发模拟**（非真网络服务），返回 AgentMetrics
#       即 exit，无挂起风险；radix_hit_rate≈0.917 与 README 文档一致。
# 重型可选栈：**本模块 src 零 import sglang/vllm**（仅 docstring/讲义里有 `sgl.` 字符串示例）。
#   sglang_compare.py 是**自带的、诚实标注的合成对照 mock**（docstring 明言「No real engine called」，
#   讲义 L10 标「mock benchmark（不需 GPU）」）——它不 import 任何重型库，故无「缺库假成功」(坑#4)
#   问题，当作普通可跑 demo（v0:false 直跑）。⚠️ 已知保真度 caveat：其 cost_vllm/cost_sglang 两函数
#   公式相同→两列 cost 恒相等，而 estimated_sglang_gain 是另写的硬编码合成估计（非由 cost 列推出）；
#   这是教学性合成数字，已在 README/此处标注「不是真 benchmark」。装真 sglang 的 Linux+CUDA 机上
#   才能跑真实横评（本模块不含真实 sglang 入口，故不设 skip 占位行）。
# 测试套件（5 文件 31 测）归 V2（--tests）；verify_env（其 import sglang 是 --env 探针）归 --env。
module: sglang-radixattention
commands:
  - id: radix-tree
    desc: "L03 RadixAttention 的 radix 树：前缀匹配 + segment 分裂 + refcount/LRU 淘汰"
    cmd: "python learning/sglang-radixattention/src/radix_tree.py"
    expect: "exit 0；逐 insert 打印 matched/n_tokens/nodes；末行 hit_rate（共享前缀真实命中）"
    tier: V1
    v0: false
    gpu: false

  - id: grammar-fsm
    desc: "L05 约束解码 mini-FSM：literal/\\d{n}/concat 编译 + token 表 mask"
    cmd: "python learning/sglang-radixattention/src/grammar_fsm.py"
    expect: "exit 0；accepts {\"name\":\"1234\"}=True；rejects 非法=True"
    tier: V1
    v0: false
    gpu: false

  - id: jump-forward
    desc: "L06 Jump-Forward Decoding：沿 FSM 唯一合法字符确定边跳过 LLM 前向"
    cmd: "python learning/sglang-radixattention/src/jump_forward.py"
    expect: "exit 0；forced='{\"name\":\"'（强制 9 字符）new_state=9（停在 \\d{4} 分支）"
    tier: V1
    v0: false
    gpu: false

  - id: constrained-sampler
    desc: "L04 约束采样：对 logits 施加 FSM mask（非法 token→-inf）+ commit 推进状态"
    cmd: "python learning/sglang-radixattention/src/constrained_sampler.py"
    expect: "exit 0；start/after-'v' 两个 mask 随状态变化；at_accept=True"
    tier: V1
    v0: false
    gpu: false

  - id: frontend-lang
    desc: "L07 前端 DSL：Stream + gen/select/fork 原语（mock generator，统计 n_forwards）"
    cmd: "python learning/sglang-radixattention/src/frontend_lang.py"
    expect: "exit 0；打印 ToT 程序展开后的 prompt + vars"
    tier: V1
    v0: false
    gpu: false

  - id: agent-patterns
    desc: "L08 agent 模式：ReAct loop / Tree-of-Thought / Self-Consistency（基于 Stream）"
    cmd: "python learning/sglang-radixattention/src/agent_patterns.py"
    expect: "exit 0；打印 ReAct 多步轨迹 + ToT 分支结果"
    tier: V1
    v0: false
    gpu: false

  - id: sglang-original-minimal
    desc: "L02 论文形态最小例：radix 前缀复用省 prefill + 压缩 FSM jump-forward（含 self-test）"
    cmd: "python learning/sglang-radixattention/src/sglang_original_minimal.py"
    expect: "exit 0；saved_prefill_tokens>0 + hit_rate>0.5 + jump-forward 省步；self-test passed"
    tier: V1
    v0: false
    gpu: false

  - id: sglang-compare
    desc: "L10 SGLang vs vLLM 5 场景合成对照（mock，不需 GPU；非真 benchmark）"
    cmd: "python learning/sglang-radixattention/src/sglang_compare.py"
    expect: "exit 0；逐场景打印 vllm_cost/sglang_cost/estimated_sglang_gain（合成估计）"
    tier: V1
    v0: false
    gpu: false

  - id: agent-server
    desc: "L11 Capstone：32-agent ReAct 进程内并发模拟 + 共享 SYSTEM_PROMPT radix 命中统计"
    cmd: "python learning/sglang-radixattention/src/agent_server.py"
    expect: "exit 0；打印 JSON：radix_hit_rate≈0.917 + forwards_per_agent=5.0 + tool_calls"
    tier: V1
    v0: false
    gpu: false
