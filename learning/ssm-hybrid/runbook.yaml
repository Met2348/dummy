# ssm-hybrid 文档入口命令清单（runbook）
# 验证：.venv/Scripts/python.exe scripts/eric_3080ti_env_audit.py --runbook --modules ssm-hybrid \
#   --json-out docs/local-env/ERIC-3080Ti-runbook-results.json --md-out docs/local-env/ERIC-3080Ti-runbook-matrix.md
# 文档入口（README「src/」+「验证」段）：10 个 from-scratch SSM/Mamba/Hybrid 直跑 demo。
# 全部脚本均无 argparse（只有 __main__ 直跑，无 add_argument/ArgumentParser）→ v0: false（跳过 --help 探针，直接 smoke 直跑）。
#   capstone_train_mini_mamba.py 也无 argparse：__main__ 硬编码 train(steps=80)（steps 形参不暴露到 CLI）→ 无 smoke 参数，直跑 80 step（CPU ~9s）。
# harness 通过 PYTHONPATH 注入 learning/ssm-hybrid/src，因此脚本内 `from common import` / `from mamba_block import` 等裸 import 在 repo-root cwd 下也能解析（与 moe-architecture 同机制）。
# 6 个一致性测试（src/tests/）归 V2（--tests）；environment/verify_env.py 归 --env。
# 无 official/ 子模块（.gitmodules 无 ssm 条目）。
# 关键坑注记：
#   - 全部为纯数值/结构 self-test，CPU 秒级 PASS 是正常的（真有 SSM/selective-scan forward + 打印真实张量 shape/参数量/loss，非 no-op）。
#   - mamba_lib：可选 CUDA-kernel 库 mamba-ssm 在本 Windows box **未装**（WSL2 only）。脚本 has_mamba_lib() 真探测 → False → 打印 `[SKIP]` 后 exit 0。
#     这是**诚实的"无外部依赖即跳过"**（非系统性坑#4 假成功——它没有捕获异常伪装成功，而是显式报告库不存在；无可运行的真实 fallback 可替代 CUDA kernel，手写等价物即 mamba_block 本身已单列）。tier 保留 V1。
#   - capstone_train：真训练循环（AdamW+grad clip+cross_entropy），loss 64.7→7.3 真下降（非假成功）。
#   - mamba_original_minimal：Mamba 论文核心机制 self-test（selective-copy gate + S6 affine-scan），确定性输入打印真实输出（非 no-op）。
#   - 全部 CPU 默认（无 .cuda() 默认路径；device 取自输入张量，默认 CPU）→ gpu: false。
module: ssm-hybrid
commands:
  - id: s4-naive
    desc: "S4 (LTI SSM) naive — ZOH 离散化 + 逐通道 sequential scan，forward self-test"
    cmd: "python learning/ssm-hybrid/src/s4_naive.py"
    tier: V1
    v0: false
    gpu: false
  - id: mamba-block
    desc: "Mamba 选择性扫描（selective_scan_naive，S6，教学版数学等价 CUDA kernel）forward self-test"
    cmd: "python learning/ssm-hybrid/src/mamba_block.py"
    tier: V1
    v0: false
    gpu: false
  - id: mamba2-block
    desc: "Mamba-2 SSD-form block（简化版复用 selective_scan_naive）forward self-test"
    cmd: "python learning/ssm-hybrid/src/mamba2_block.py"
    tier: V1
    v0: false
    gpu: false
  - id: mamba-original-minimal
    desc: "Mamba 论文核心机制最小复现（selective-copy gate + S6 affine prefix-scan）确定性 self-test"
    cmd: "python learning/ssm-hybrid/src/mamba_original_minimal.py"
    tier: V1
    v0: false
    gpu: false
  - id: rwkv-block
    desc: "RWKV-7 简化版（learned time-decay 加权 WKV time-mix）forward self-test"
    cmd: "python learning/ssm-hybrid/src/rwkv_block.py"
    tier: V1
    v0: false
    gpu: false
  - id: jamba-block
    desc: "Jamba 混合层（每 8 层 1 attention，其余 Mamba + FFN）forward self-test"
    cmd: "python learning/ssm-hybrid/src/jamba_block.py"
    tier: V1
    v0: false
    gpu: false
  - id: zamba-block
    desc: "Zamba 共享注意力（单个 attention 跨多层周期性复用 + Mamba 主干）forward self-test"
    cmd: "python learning/ssm-hybrid/src/zamba_block.py"
    tier: V1
    v0: false
    gpu: false
  - id: mini-mamba
    desc: "Mini-Mamba capstone 模型（embed + N×MambaBlock + RMSNorm + tied lm_head）forward self-test"
    cmd: "python learning/ssm-hybrid/src/mini_mamba.py"
    tier: V1
    v0: false
    gpu: false
  - id: mamba-lib
    desc: "mamba-ssm 官方库 wrapper（探测可选 CUDA-kernel 库；本机未装→诚实 [SKIP] exit 0）"
    cmd: "python learning/ssm-hybrid/src/mamba_lib.py"
    tier: V1
    v0: false
    gpu: false
  - id: capstone-train
    desc: "Capstone mini-Mamba 训练（AdamW+grad clip，mock data，loss 64.7→7.3 真下降，80 step CPU ~9s）"
    cmd: "python learning/ssm-hybrid/src/capstone_train_mini_mamba.py"
    tier: V1
    v0: false
    gpu: false
