# adapter-tuning-family 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules adapter-tuning-family --timeout 300
# 文档入口（README §目录结构/实用入口 + lectures）：11 种 Adapter 方法的 minimal（手写）+ adapters（调包）对照 demo，外加 (IA)³ 的 peft 第三轨。
# 这些脚本均无 argparse（直跑 main，固定小预算 GPT-2，纯结构/参数量演示，无梯度训练）→ v0: false（跳过 --help 探针，直接 smoke 直跑）。
#
# 三轨说明：
#   *_minimal.py  : 手写最小实现，只依赖 torch + transformers，本地可跑 → V1。
#   ia3_peft.py   : peft 库 IA3Config，peft 已装 → V1。
#   *_adapters.py : AdapterHub `adapters` 库调包版。**adapters 库本仓库未安装**（它强制 transformers 4.x，
#                   与本仓库 transformers 5.10.2 冲突），故全部 tier: skip。脚本在 import 处即 fail-fast
#                   （ModuleNotFoundError，exit 1，非静默假成功），无需改码；如需运行须单独建 transformers 4.x venv。
#
# 8 个一致性测试归 V2（--tests，~127s 重）；verify_env 归 --env。
module: adapter-tuning-family
commands:
  # ==================== 可本地运行（V1）====================

  # ---- 00 原始 Adapter（纯 Python，无 torch，CPU 秒级）----
  - id: adapter-original-minimal
    desc: "原始 Adapter 概念最小实现（纯 Python 手算 down→act→up→残差，无依赖）"
    cmd: "python learning/adapter-tuning-family/src/adapter_original_minimal.py"
    tier: V1
    v0: false
    gpu: false

  # ---- 01 Houlsby / Pfeiffer ----
  - id: houlsby-minimal
    desc: "Houlsby Adapter 手写最小实现（双串联，GPT-2，r=16，608,640 参数；验初始 forward=base）"
    cmd: "python learning/adapter-tuning-family/src/houlsby_minimal.py"
    tier: V1
    v0: false
    gpu: true
  - id: pfeiffer-minimal
    desc: "Pfeiffer Adapter 手写最小实现（单串联简化版，304,320 参数）"
    cmd: "python learning/adapter-tuning-family/src/pfeiffer_minimal.py"
    tier: V1
    v0: false
    gpu: true

  # ---- 02 AdapterFusion ----
  - id: adapterfusion-minimal
    desc: "AdapterFusion 手写最小实现（多任务 attention 融合 Σαᵢ·aᵢ(x)）"
    cmd: "python learning/adapter-tuning-family/src/adapterfusion_minimal.py"
    tier: V1
    v0: false
    gpu: true

  # ---- 03 AdapterDrop / Compacter ----
  - id: adapterdrop-minimal
    desc: "AdapterDrop 手写最小实现（按层随机丢弃，k=5 时 7 层 active）"
    cmd: "python learning/adapter-tuning-family/src/adapterdrop_minimal.py"
    tier: V1
    v0: false
    gpu: true
  - id: compacter-minimal
    desc: "Compacter 手写最小实现（PHM 超复数分解 + 跨层共享 A，Kronecker 数值精确）"
    cmd: "python learning/adapter-tuning-family/src/compacter_minimal.py"
    tier: V1
    v0: false
    gpu: true

  # ---- 04 Parallel Adapter ----
  - id: parallel-minimal
    desc: "Parallel Adapter 手写最小实现（并联结构，σ=identity 时等价 LoRA）"
    cmd: "python learning/adapter-tuning-family/src/parallel_minimal.py"
    tier: V1
    v0: false
    gpu: true

  # ---- 05 (IA)³ 三轨 ----
  - id: ia3-minimal
    desc: "(IA)³ 手写最小实现（3 个对角缩放向量 ℓ_k/ℓ_v/ℓ_ff，55,296 参数，初始 Δ=0）"
    cmd: "python learning/adapter-tuning-family/src/ia3_minimal.py"
    tier: V1
    v0: false
    gpu: true
  - id: ia3-peft
    desc: "(IA)³ peft 调包对照（IA3Config，第三轨，三方参数量都是 55,296）"
    cmd: "python learning/adapter-tuning-family/src/ia3_peft.py"
    tier: V1
    v0: false
    gpu: true

  # ---- 06 MAM Adapter（理论高峰）----
  - id: mam-minimal
    desc: "MAM Adapter 手写最小实现（Prefix(attn) + Parallel(FFN) 统一视角）"
    cmd: "python learning/adapter-tuning-family/src/mam_minimal.py"
    tier: V1
    v0: false
    gpu: true

  # ---- 07 K-Adapter / MAD-X ----
  - id: k-adapter-minimal
    desc: "K-Adapter 手写最小实现（多类知识并行注入 + 冻结切换）"
    cmd: "python learning/adapter-tuning-family/src/k_adapter_minimal.py"
    tier: V1
    v0: false
    gpu: true
  - id: madx-minimal
    desc: "MAD-X 手写最小实现（语言 adapter Stack 任务 adapter，跨语言切换）"
    cmd: "python learning/adapter-tuning-family/src/madx_minimal.py"
    tier: V1
    v0: false
    gpu: true

  # ---- 08 AdaMix ----
  - id: adamix-minimal
    desc: "AdaMix 手写最小实现（Mixture of Adapters：train 随机路由 / infer 平均 / merge N→1）"
    cmd: "python learning/adapter-tuning-family/src/adamix_minimal.py"
    tier: V1
    v0: false
    gpu: true

  # ==================== adapters 库调包版（本地 SKIP）====================
  # 原因：adapters 库未安装（强制 transformers 4.x，与本仓库 transformers 5.10.2 冲突）。
  # 脚本在 `from adapters import ...` 处 fail-fast（ModuleNotFoundError，exit 1），非静默假成功。
  # 如需运行：单独建 transformers 4.x venv 后 `pip install adapters`。
  - id: houlsby-adapters
    desc: "[SKIP·需 adapters 库] Houlsby adapters 库调包版（AdapterConfig.load('houlsby')）"
    cmd: "python learning/adapter-tuning-family/src/houlsby_adapters.py"
    tier: skip
    v0: false
    gpu: true
  - id: pfeiffer-adapters
    desc: "[SKIP·需 adapters 库] Pfeiffer adapters 库调包版"
    cmd: "python learning/adapter-tuning-family/src/pfeiffer_adapters.py"
    tier: skip
    v0: false
    gpu: true
  - id: adapterfusion-adapters
    desc: "[SKIP·需 adapters 库] AdapterFusion adapters 库调包版（composition.Fuse）"
    cmd: "python learning/adapter-tuning-family/src/adapterfusion_adapters.py"
    tier: skip
    v0: false
    gpu: true
  - id: adapterdrop-adapters
    desc: "[SKIP·需 adapters 库] AdapterDrop adapters 库调包版（Skip composition）"
    cmd: "python learning/adapter-tuning-family/src/adapterdrop_adapters.py"
    tier: skip
    v0: false
    gpu: true
  - id: compacter-adapters
    desc: "[SKIP·需 adapters 库] Compacter adapters 库调包版（AdapterConfig.load('compacter')）"
    cmd: "python learning/adapter-tuning-family/src/compacter_adapters.py"
    tier: skip
    v0: false
    gpu: true
  - id: parallel-adapters
    desc: "[SKIP·需 adapters 库] Parallel Adapter adapters 库调包版"
    cmd: "python learning/adapter-tuning-family/src/parallel_adapters.py"
    tier: skip
    v0: false
    gpu: true
  - id: ia3-adapters
    desc: "[SKIP·需 adapters 库] (IA)³ adapters 库调包版（三轨第二版）"
    cmd: "python learning/adapter-tuning-family/src/ia3_adapters.py"
    tier: skip
    v0: false
    gpu: true
  - id: k-adapter-adapters
    desc: "[SKIP·需 adapters 库] K-Adapter adapters 库调包版（composition.Stack）"
    cmd: "python learning/adapter-tuning-family/src/k_adapter_adapters.py"
    tier: skip
    v0: false
    gpu: true
  - id: madx-adapters
    desc: "[SKIP·需 adapters 库] MAD-X adapters 库调包版（composition.Stack 语言→任务）"
    cmd: "python learning/adapter-tuning-family/src/madx_adapters.py"
    tier: skip
    v0: false
    gpu: true
