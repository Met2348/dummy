# multimodal-agent 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules multimodal-agent
# 文档入口（README §入口 + L02/L09/L13/L14 讲义）：6 个直跑 demo。
# 全部脚本无 argparse → v0: false（跳过 --help 探针，直接 smoke 直跑到完成）。
# 5 个一致性测试（test_vlm_r1_graduation.py）归 V2（--tests）；verify_env 归 --env。
# 说明：src 全是手写 toy（仅 re/torch），讲义里的 Qwen2-VL/peft/PIL/verl 只出现在
#       vlm_r1_setup_code() 返回的伪代码字符串里，不会执行 → 本地无重型依赖即可全跑。
#       因此 gpu: false（demo 用小 CPU 张量，不落 cuda）。
module: multimodal-agent
commands:
  - id: vlm-r1-minimal
    desc: "VLM-R1 规则 reward（counting / grounding-IoU / format）+ GRPO 训练伪代码"
    cmd: "python learning/multimodal-agent/src/vlm_r1_minimal.py"
    expect: "exit 0；打印 counting/grounding reward 演示 + setup 伪代码"
    tier: V1
    v0: false
    gpu: false

  - id: vision-r1-original-minimal
    desc: "Vision-R1 机制：模态桥接冷启动 + HFRRF 硬格式奖励 + GRPO z-score advantage + PTST"
    cmd: "python learning/multimodal-agent/src/vision_r1_original_minimal.py"
    expect: "exit 0；打印 'Vision-R1 original minimal checks passed'（内含 _self_test 断言）"
    tier: V1
    v0: false
    gpu: false

  - id: s1-budget-forcing
    desc: "s1 budget forcing：think<min 注入 Wait 续推 / think>max 截断（双侧预算）"
    cmd: "python learning/multimodal-agent/src/s1_budget_forcing.py"
    expect: "exit 0；short→status=extended（注入 Wait），long→status=truncated + 长度分布统计"
    tier: V1
    v0: false
    gpu: false

  - id: safe-rlhf-minimal
    desc: "Safe-RLHF 拉格朗日对偶：max R_helpful s.t. R_harmless≥阈值，λ 违约上升（dual ascent）"
    cmd: "python learning/multimodal-agent/src/safe_rlhf_minimal.py"
    expect: "exit 0；50 step 打印 L/R_h/R_safe/lambda；harmless 上升→lambda 下降 + MaxMin 对比"
    tier: V1
    v0: false
    gpu: false

  - id: unified-view
    desc: "五线综合等价数值验证：LoRA≡Parallel-Adapter / DPO≡BT-implicit-RM / GRPO advantage mean=0"
    cmd: "python learning/multimodal-agent/src/unified_view.py"
    expect: "exit 0；3 个等价关系全部 PASS（max diff ~1e-7 量级）"
    tier: V1
    v0: false
    gpu: false

  - id: capstone-graduation
    desc: "毕业 Capstone：同一道 GSM8K 题 × 5 路径（Vanilla/LoRA/Adapter/DPO/R1-Zero）响应对照"
    cmd: "python learning/multimodal-agent/src/capstone_graduation.py"
    expect: "exit 0；5 路径 response + correctness 标记 + 五线观察（mock response，已诚实标注）"
    tier: V1
    v0: false
    gpu: false
