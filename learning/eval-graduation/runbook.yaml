# eval-graduation 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules eval-graduation
# 文档入口（README「跑 3 Capstone」段 + L02/L12/L13/L14 讲义）：6 个直跑脚本
# （1 个共享 ckpt_zoo 库 self-test + mini-HELM/mini-Arena/红队/防御/Portfolio 5 个 capstone）。
# 全部无 argparse、纯 stdlib（无 torch/transformers）→ v0: false（跳过 --help 探针，直接 smoke 直跑）。
# 5 mock ckpt 的 generate() 是手写字面量回复（非真模型推理），5 维评测/battle/红队/防御逻辑是真计算
# （非硬编码分数），已在各脚本 _self_test() 里用非平凡断言锁住。
# 1 个聚合测试（test_graduation.py）归 V2（--tests，pytest 收 0 用例→回退按脚本直跑，打印 6/6）；无 verify_env 阻塞项。
module: eval-graduation
commands:
  - id: ckpt-zoo-interface
    desc: "L02 共享 ckpt_zoo 库 self-test：5 mock ckpt（vanilla/lora/dpo/r1_tiny/phi_tiny）接口"
    cmd: "python learning/eval-graduation/src/ckpt_zoo/interface.py"
    expect: "exit 0；打印 interface.py self-test: OK"
    tier: V1
    v0: false
    gpu: false

  - id: capstone1-mini-helm
    desc: "Capstone-1：mini-HELM 5 ckpt × 4 维（knowledge/reasoning/safety/efficiency）打分表 + ASCII 雷达"
    cmd: "python learning/eval-graduation/src/mini_helm.py"
    expect: "exit 0；5×4 表 + r1_tiny/phi_tiny 雷达；vanilla reasoning/safety=0.00，其余维度多数满分"
    tier: V1
    v0: false
    gpu: false

  - id: capstone2a-mini-arena
    desc: "Capstone-2A：mini-Arena 5 ckpt round-robin battle → Bradley-Terry 拟合 → Elo 排行榜"
    cmd: "python learning/eval-graduation/src/mini_arena.py"
    expect: "exit 0；Elo 排行表；vanilla Elo 最低（答错 + 泄漏模板）"
    tier: V1
    v0: false
    gpu: false

  - id: capstone2b-mini-red-team
    desc: "Capstone-2B：mini 红队 3 攻击（direct/persona_wrap/multi_turn）× 5 ckpt ASR 矩阵"
    cmd: "python learning/eval-graduation/src/mini_red_team.py"
    expect: "exit 0；vanilla 3 攻击 ASR 全 100%，dpo/phi_tiny 全 0%"
    tier: V1
    v0: false
    gpu: false

  - id: capstone2c-mini-defense
    desc: "Capstone-2C：输入+输出分类器纵深防御，红队 ASR 加固前后对照"
    cmd: "python learning/eval-graduation/src/mini_defense.py"
    expect: "exit 0；vanilla no_def 100% → with_def 0%（input classifier 救活弱 ckpt）"
    tier: V1
    v0: false
    gpu: false

  - id: capstone3-portfolio
    desc: "Capstone-3⭐⭐⭐⭐⭐⭐：汇总 32 专题时间线 + 5-ckpt 元数据 + 4 个 Capstone 表 + 决策树，落盘 portfolio.md"
    cmd: "python learning/eval-graduation/src/portfolio.py"
    expect: "exit 0；打印 portfolio.py self-test: OK + 前 1500 字符（含 32 个 topic 枚举 + 4 张表）+ 写出系统临时目录下的 portfolio.md（不落 repo）"
    tier: V1
    v0: false
    gpu: false
