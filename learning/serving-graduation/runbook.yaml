# serving-graduation 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules serving-graduation
# 文档入口（README §运行验证）：8 个直跑入口 = 6 个支持 demo（agent 多轮缓存/嵌入/路由/
# 评分卡/思考预算/VLM）+ 2 个毕业 capstone（r1_tiny_deploy / graduation_e2e）。
# 全部无 argparse（capstone2 有可选 --out）、纯 CPU 秒级（v0: false）。
# 注：6 个支持脚本【原全部缺 __main__】+ capstone1 也缺 __main__（直跑无输出）→本轮逐个补 demo()/__main__；
#     capstone2 run.py 原用相对 import 只能 `python -m`，本轮加 try/except 使其直接当脚本也能跑。
#     测试归 V2（--tests，23 passed）。
module: serving-graduation
commands:
  - id: agent-inference-demo
    desc: "Agent 多轮推理：naive vs radix-cached prefill 省 token"
    cmd: "python learning/serving-graduation/src/agent_inference_demo.py"
    tier: V1
    v0: false
    gpu: false

  - id: embedding-serve
    desc: "Mock 嵌入服务（sha256 确定性占位）+ 余弦相似度"
    cmd: "python learning/serving-graduation/src/embedding_serve.py"
    tier: V1
    v0: false
    gpu: false

  - id: multi-model-router
    desc: "多模型路由：按 query 复杂度选 tier + 成本估算"
    cmd: "python learning/serving-graduation/src/multi_model_router.py"
    tier: V1
    v0: false
    gpu: false

  - id: serving-scorecard
    desc: "毕业评分卡：correctness 门 + TTFT/TPOT SLO + goodput 排名"
    cmd: "python learning/serving-graduation/src/serving_scorecard.py"
    tier: V1
    v0: false
    gpu: false

  - id: thinking-budget
    desc: "思考预算强制（s1 风格预算耗尽收尾 + Wait 注入）"
    cmd: "python learning/serving-graduation/src/thinking_budget.py"
    tier: V1
    v0: false
    gpu: false

  - id: vlm-serve
    desc: "Mock VLM 服务：图像编码 + 文本生成"
    cmd: "python learning/serving-graduation/src/vlm_serve.py"
    tier: V1
    v0: false
    gpu: false

  # 两个毕业 capstone（子包）
  - id: capstone1-r1-tiny
    desc: "Capstone-1：R1-tiny 部署 demo（mock R1，<think>/<answer> 流式）"
    cmd: "python learning/serving-graduation/src/r1_tiny_deploy/serve.py"
    tier: V1
    v0: false
    gpu: false

  - id: capstone2-graduation-e2e
    desc: "Capstone-2：五线综合 e2e 报告（默认写 tempdir，--out 可指定）"
    cmd: "python learning/serving-graduation/src/graduation_e2e/run.py"
    tier: V1
    v0: false
    gpu: false
