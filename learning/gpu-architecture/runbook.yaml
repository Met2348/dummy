# gpu-architecture 文档入口命令清单（runbook）
# 验证：.venv/Scripts/python.exe scripts/eric_3080ti_env_audit.py --runbook --modules gpu-architecture
# 文档入口：lectures/08-capstone.md 明确给出 capstone_roofline_zoo.py 跑法；
#   paper/guide_01_roofline_model.md §15 给出 roofline_original_minimal.py + tests/test_all.py 跑法；
#   其余 5 个 src 脚本（common/roofline/memory_hierarchy/tensor_core/nvlink_topology/sm_occupancy）
#   无 lecture 显式 python 命令，但均有 __main__ 直跑 self-test，按惯例一并登记。
# 全部 8 个脚本均无 argparse（grep 全仓只有 dataclasses/typing 相关 import，零 add_argument/ArgumentParser）
#   → v0: false（跳过 --help 探针，直接 smoke 直跑）。无可调预算参数 → 无 full/smoke 字段。
# 全部脚本仅 import 标准库 dataclasses（+ 互相 import common/roofline）→ CPU 秒级，无需 GPU、无需装包。
# 没有 environment/ 目录、没有 verify_env.py（--env 对本模块 N/A）。
# tests/test_all.py 只有 def main()，无 test_ 前缀函数 → pytest 下 collect-0（rc=5），
#   harness `_run_test_command` 会自动回退直接 `python tests/test_all.py` 执行（已实测 8/8 passed），
#   归 V2（--tests），不在此重复登记。
module: gpu-architecture
commands:
  - id: common
    desc: "GPUSpec 数据类 + A100/H100/H200/B200/GB200 参数表 + ridge point self-test"
    cmd: "python learning/gpu-architecture/src/common.py"
    tier: V1
    v0: false
    gpu: false
  - id: memory-hierarchy
    desc: "GPU 存储层次（registers/SMEM/L1/L2/HBM3）tier 推荐 self-test"
    cmd: "python learning/gpu-architecture/src/memory_hierarchy.py"
    tier: V1
    v0: false
    gpu: false
  - id: tensor-core
    desc: "Tensor Core MMA 形状选择（H100 wgmma / B200 tcgen05）self-test"
    cmd: "python learning/gpu-architecture/src/tensor_core.py"
    tier: V1
    v0: false
    gpu: false
  - id: sm-occupancy
    desc: "SM 占用率计算器（threads/warps/regs/smem 四瓶颈）self-test"
    cmd: "python learning/gpu-architecture/src/sm_occupancy.py"
    tier: V1
    v0: false
    gpu: false
  - id: nvlink-topology
    desc: "NVLink/NVSwitch 拓扑 ring all-reduce 时延对比（DGX-A100/H100/GB200-NVL72/PCIe）self-test"
    cmd: "python learning/gpu-architecture/src/nvlink_topology.py"
    tier: V1
    v0: false
    gpu: false
  - id: roofline
    desc: "现代 GPU roofline 分析器（GEMM/Attention/LayerNorm profile → compute/memory bound）self-test"
    cmd: "python learning/gpu-architecture/src/roofline.py"
    tier: V1
    v0: false
    gpu: false
  - id: roofline-original-minimal
    desc: "复现 Williams/Waterman/Patterson 2009 原始 Roofline 论文模型（Opteron X2/X4 + 4 kernel + ceilings）self-test"
    cmd: "python learning/gpu-architecture/src/roofline_original_minimal.py"
    tier: V1
    v0: false
    gpu: false
  - id: capstone-roofline-zoo
    desc: "Capstone：10 LLM op × 4 代 GPU = 40 组 roofline 分析，验证多数 LLM op 是 memory bound"
    cmd: "python learning/gpu-architecture/src/capstone_roofline_zoo.py"
    tier: V1
    v0: false
    gpu: false
