# llm-judge-arena 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules llm-judge-arena
# 文档入口（README「总览」表 + 各 lecture「代码」列）：8 个 toy judge/arena 直跑 demo（L01-L06/L08/L12）。
# 这些脚本全部无 argparse → v0: false（跳过 --help 探针，直接 smoke 直跑到完成）。
# 纯 stdlib 数值/字符串 demo，CPU 即可（gpu: false）。
# test_judge.py（README「跑测试」段，8 modules self-test 聚合）归 V2（--tests，pytest collect-0 会自动回退当脚本直跑）；verify_env 归 --env。
module: llm-judge-arena
commands:
  - id: judge-common
    desc: "L01：judge 工具箱（length/keyword/position-bias judge + battle/sample 数据结构）"
    cmd: "python learning/llm-judge-arena/src/common.py"
    expect: "exit 0；self-test OK"
    tier: V1
    v0: false
    gpu: false

  - id: mt-bench
    desc: "L02：MT-Bench toy pointwise 打分（8 类 1-5 分）"
    cmd: "python learning/llm-judge-arena/src/mt_bench_runner.py"
    expect: "exit 0；self-test OK"
    tier: V1
    v0: false
    gpu: false

  - id: arena-hard
    desc: "L03：Arena-Hard toy pairwise battle + win rate"
    cmd: "python learning/llm-judge-arena/src/arena_hard_runner.py"
    expect: "exit 0；self-test OK"
    tier: V1
    v0: false
    gpu: false

  - id: bradley-terry
    desc: "L04：Chatbot Arena Bradley-Terry MM 拟合 + Elo 转换"
    cmd: "python learning/llm-judge-arena/src/bradley_terry.py"
    expect: "exit 0；self-test OK（A>B>C 强度序 + Elo 序）"
    tier: V1
    v0: false
    gpu: false

  - id: alpaca-eval
    desc: "L05：AlpacaEval 2 length-controlled win rate"
    cmd: "python learning/llm-judge-arena/src/alpaca_eval.py"
    expect: "exit 0；self-test OK（等长 raw==lc；变长 lc<raw）"
    tier: V1
    v0: false
    gpu: false

  - id: prometheus2
    desc: "L06：Prometheus 2 rubric 打分 mock（helpfulness/factuality/clarity）"
    cmd: "python learning/llm-judge-arena/src/prometheus2_judge.py"
    expect: "exit 0；self-test OK"
    tier: V1
    v0: false
    gpu: false

  - id: judge-bias
    desc: "L08：4 大 judge bias 复现（position/verbosity/swap-consistency）"
    cmd: "python learning/llm-judge-arena/src/judge_bias_demo.py"
    expect: "exit 0；self-test OK"
    tier: V1
    v0: false
    gpu: false

  - id: capstone-mini-arena
    desc: "L12 Capstone：5 mock 模型 round-robin battle → BT 拟合 → Elo 排行榜（README「跑 capstone」入口）"
    cmd: "python learning/llm-judge-arena/src/mini_arena.py"
    expect: "exit 0；self-test OK；打印 mini-Arena leaderboard（r1_tiny 最高分）"
    tier: V1
    v0: false
    gpu: false
