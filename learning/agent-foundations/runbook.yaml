# agent-foundations 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules agent-foundations
# 文档入口（README 总览表 L01-L12 对应的 12 个 src 脚本，含 src/tools/ 4 个 mock 工具）：
# 全是手写 agent 范式 + mock LLM/mock 工具，纯 stdlib，CPU 秒级，无外部依赖。
# 这些脚本全部无 argparse → v0: false（跳过 --help 探针，直接 smoke 直跑）。
# 每个脚本 __main__ = 跑内置 _self_test()（真断言，非 print-only）；capstone 额外打印完整 trace md。
# harness 给每个模块设 PYTHONPATH=src，故裸导入（如 `from common import ...`）可解析；
# 命令用 repo-root 相对路径（Python 会把脚本自身所在目录插入 sys.path[0]，故也可脱离 harness 直接跑）。
# src/tests/test_agent_foundations.py 是聚合测试跑手（无 pytest test_ 函数）归 V2（--tests，
# pytest collect-0 → 回退按脚本直跑，12/12 真断言）；environment/verify_env.py 归 --env。
module: agent-foundations
commands:
  # --- 共享后端（非独立 lecture，被其余全部脚本依赖）
  - id: common-selftest
    desc: "共享后端 self-test（Tool/Trace/parse_action/parse_final/mock pattern-llm）"
    cmd: "python learning/agent-foundations/src/common.py"
    tier: V1
    v0: false
    gpu: false

  - id: react-loop
    desc: "L02 ReAct self-test（Yao 2022 thought-action-observation 循环）"
    cmd: "python learning/agent-foundations/src/react_loop.py"
    tier: V1
    v0: false
    gpu: false

  - id: reflexion
    desc: "L04 Reflexion self-test（Shinn 2023 actor+evaluator+self-reflect 多轮试错）"
    cmd: "python learning/agent-foundations/src/reflexion_demo.py"
    tier: V1
    v0: false
    gpu: false

  - id: plan-execute
    desc: "L06 Plan-and-Execute self-test（先规划一次，再顺序执行）"
    cmd: "python learning/agent-foundations/src/plan_execute.py"
    tier: V1
    v0: false
    gpu: false

  - id: router-pattern
    desc: "L07 Router pattern self-test（LLM 路由 + embedding cosine 路由两种）"
    cmd: "python learning/agent-foundations/src/router_pattern.py"
    tier: V1
    v0: false
    gpu: false

  - id: tool-calculator
    desc: "L08 calculator 工具 self-test（受限 eval，拦截 import 等非法 token）"
    cmd: "python learning/agent-foundations/src/tools/calculator.py"
    tier: V1
    v0: false
    gpu: false

  - id: tool-search-mock
    desc: "L08 search_mock 工具 self-test（关键词匹配 canned 搜索结果）"
    cmd: "python learning/agent-foundations/src/tools/search_mock.py"
    tier: V1
    v0: false
    gpu: false

  - id: tool-file-op
    desc: "L08 file_op 工具 self-test（内存虚拟文件系统 read/write/list）"
    cmd: "python learning/agent-foundations/src/tools/file_op.py"
    tier: V1
    v0: false
    gpu: false

  - id: tool-web-mock
    desc: "L08 web_mock 工具 self-test（canned 网页内容 mock HTTP GET）"
    cmd: "python learning/agent-foundations/src/tools/web_mock.py"
    tier: V1
    v0: false
    gpu: false

  - id: state-machine
    desc: "L10 StateGraph self-test（手写 LangGraph 风格节点/边/条件边）"
    cmd: "python learning/agent-foundations/src/state_machine.py"
    tier: V1
    v0: false
    gpu: false

  - id: tracing
    desc: "L11 Tracing/replay self-test（trace<->json 往返 + cost_summary 估算）"
    cmd: "python learning/agent-foundations/src/tracing.py"
    tier: V1
    v0: false
    gpu: false

  - id: capstone-react
    desc: "L12 Capstone：ReAct loop + 4 mock 工具（Final Answer==18），打印完整 trace md"
    cmd: "python learning/agent-foundations/src/capstone_react.py"
    tier: V1
    v0: false
    gpu: false
