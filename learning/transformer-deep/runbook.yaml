# transformer-deep 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules transformer-deep
# 文档入口（README「目录结构」+「验证命令」）：18 个 from-scratch 直跑 demo。
# 这些脚本除 capstone_train 外均无 argparse（只有 __main__ 直跑）→ v0: false（跳过 --help 探针，直接 smoke 直跑）。
#   capstone_train.py 有 argparse（--steps/--device）→ v0: true，smoke 用最小 steps。
# 6 个一致性测试（src/tests/）归 V2（--tests）；environment/verify_env.py 归 --env。
# 子模块 official/repos/tensor2tensor 是官方参考实现，不在 runbook 范围（不跑/不收录）。
# 关键坑注记：
#   - 全部为纯数值/结构 self-test，CPU 秒级 PASS 是正常的（真有 assert + 打印真实张量/diff/参数量，非 no-op）。
#   - flash_attn_lib / fa2_fa3_bench：flash-attn 库在 Win 装不上 → 走 PyTorch SDPA 真实路径，
#     flash-attn 分支显式打印 [SKIP]（非假成功；主路径 SDPA 在 3080Ti 真跑）。
#   - deepseek_v3_summary / llama3_summary：打印 architecture 配置 + 真实算 KV-cache GB 数（非纯静态文本）。
#   - capstone_train：真训练循环（AdamW + cosine lr + grad clip），smoke 8 steps 真 forward/backward，loss 真打印。
module: transformer-deep
commands:
  - id: pe-sinusoidal
    desc: "Sinusoidal 位置编码（Vaswani 2017）self-test"
    cmd: "python learning/transformer-deep/src/pe_sinusoidal.py"
    tier: V1
    v0: false
    gpu: false
  - id: pe-alibi
    desc: "ALiBi 线性偏置 bias 矩阵 demo"
    cmd: "python learning/transformer-deep/src/pe_alibi.py"
    tier: V1
    v0: false
    gpu: false
  - id: rope
    desc: "RoPE 旋转位置编码（interleaved，相对位置不变性 sanity）"
    cmd: "python learning/transformer-deep/src/rope.py"
    tier: V1
    v0: false
    gpu: false
  - id: mha
    desc: "Multi-Head Attention（Vaswani 2017）forward self-test"
    cmd: "python learning/transformer-deep/src/mha.py"
    tier: V1
    v0: false
    gpu: false
  - id: mqa
    desc: "Multi-Query Attention（Shazeer 2019）forward self-test"
    cmd: "python learning/transformer-deep/src/mqa.py"
    tier: V1
    v0: false
    gpu: false
  - id: gqa
    desc: "Grouped-Query Attention（Ainslie 2023）forward self-test"
    cmd: "python learning/transformer-deep/src/gqa.py"
    tier: V1
    v0: false
    gpu: false
  - id: mla
    desc: "Multi-head Latent Attention（DeepSeek-V2 低秩压缩）forward self-test"
    cmd: "python learning/transformer-deep/src/mla.py"
    tier: V1
    v0: false
    gpu: false
  - id: rmsnorm
    desc: "RMSNorm 手写实现 vs torch.nn.RMSNorm 对照"
    cmd: "python learning/transformer-deep/src/rmsnorm.py"
    tier: V1
    v0: false
    gpu: false
  - id: swiglu
    desc: "SwiGLU / GeGLU / GELU MLP 三变体参数量对照"
    cmd: "python learning/transformer-deep/src/swiglu.py"
    tier: V1
    v0: false
    gpu: false
  - id: flash-attn-naive
    desc: "FlashAttention v1 naive（tiling + online softmax）数值等价 vanilla"
    cmd: "python learning/transformer-deep/src/flash_attn_naive.py"
    tier: V1
    v0: false
    gpu: false
  - id: flash-attn-lib
    desc: "PyTorch SDPA benchmark（flash-attn 库缺则 [SKIP]，SDPA 主路径真跑）"
    cmd: "python learning/transformer-deep/src/flash_attn_lib.py"
    tier: V1
    v0: false
    gpu: true
  - id: fa2-fa3-bench
    desc: "FA2/FA3 论文报数 + 本机 SDPA 实测 TFLOPS"
    cmd: "python learning/transformer-deep/src/fa2_fa3_bench.py"
    tier: V1
    v0: false
    gpu: true
  - id: paged-attn
    desc: "PagedAttention 教学版（block table + KV pool alloc/share/release）"
    cmd: "python learning/transformer-deep/src/paged_attn_demo.py"
    tier: V1
    v0: false
    gpu: false
  - id: sliding-window
    desc: "Sliding Window Attention（Mistral SWA mask + forward）"
    cmd: "python learning/transformer-deep/src/sliding_window.py"
    tier: V1
    v0: false
    gpu: false
  - id: deepseek-v3-summary
    desc: "DeepSeek-V3 架构配置 + MLA/GQA KV-cache GB 对照"
    cmd: "python learning/transformer-deep/src/deepseek_v3_summary.py"
    tier: V1
    v0: false
    gpu: false
  - id: llama3-summary
    desc: "Llama-3 8B/70B/405B 架构配置 + KV-cache GB"
    cmd: "python learning/transformer-deep/src/llama3_summary.py"
    tier: V1
    v0: false
    gpu: false
  - id: gpt-mini
    desc: "GPT-mini（RoPE+RMSNorm+GQA+SwiGLU）forward + KV-cache generate self-test"
    cmd: "python learning/transformer-deep/src/gpt_mini.py"
    tier: V1
    v0: false
    gpu: false
  - id: capstone-train
    desc: "Capstone GPT-mini 训练（AdamW+cosine lr+grad clip，mock data smoke）"
    cmd: "python learning/transformer-deep/src/capstone_train.py --steps {steps}"
    full:  { steps: 50 }
    smoke: { steps: 8 }
    tier: V1
    v0: true
    gpu: true
