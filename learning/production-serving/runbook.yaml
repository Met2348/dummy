# production-serving 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules production-serving
# 文档入口（README §运行验证）：6 个直跑 demo（成本/指标/SSE/Clipper/OpenAI 协议/TRT-LLM 配置）。
# 全部无 argparse、纯 CPU 秒级（v0: false）。openai_api_server 的 __main__ 只演示协议层、不起阻塞服务。
# 注：clipper/cost_calc/metrics/openai_api_server/streaming_sse 原缺 __main__（直跑无输出），
#     本轮补了 demo() + __main__ 使其可跑；trtllm_build 本就有 __main__。
# 测试归 V2（--tests，27 passed）。
module: production-serving
commands:
  - id: cost-calc
    desc: "服务成本：\\$/M-token + 缓存节省 + 成本感知路由"
    cmd: "python learning/production-serving/src/cost_calc.py"
    tier: V1
    v0: false
    gpu: false

  - id: metrics-prometheus
    desc: "Prometheus 风格 Counter/Histogram + p50/p95 分位渲染"
    cmd: "python learning/production-serving/src/metrics_prometheus.py"
    tier: V1
    v0: false
    gpu: false

  - id: streaming-sse
    desc: "SSE 流式编码/解析往返（OpenAI 风格 data: 行）"
    cmd: "python learning/production-serving/src/streaming_sse.py"
    tier: V1
    v0: false
    gpu: false

  - id: clipper-original-minimal
    desc: "Clipper：自适应批处理(AIMD) + best-effort ensemble + EXP3 选择"
    cmd: "python learning/production-serving/src/clipper_original_minimal.py"
    tier: V1
    v0: false
    gpu: false

  - id: openai-api-server
    desc: "OpenAI 兼容 API 协议层 demo（构造/校验/mock 生成，不起阻塞服务）"
    cmd: "python learning/production-serving/src/openai_api_server.py"
    tier: V1
    v0: false
    gpu: false

  - id: trtllm-build
    desc: "TensorRT-LLM build 配置 demo（mock，Windows 无 trtllm）"
    cmd: "python learning/production-serving/src/trtllm_build.py"
    tier: V1
    v0: false
    gpu: false
