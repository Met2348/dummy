# inference-engine-core 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules inference-engine-core
# cmd = README「运行」原文形态（repo-root 相对）。smoke = 验证器实际跑的最小预算。
#
# 性质：系统/工程类模块（从零手写 mini-vLLM 机制）。多数 demo 是纯 CPU 数值演示
#   （paged KV / continuous batching / chunked prefill / prefix cache / sampling），
#   秒级 PASS 是真实计算（已逐一核 stdout 有 paged/batching/hit_rate 输出，非 no-op）。
# 重型可选栈 triton/vllm 本机均未装（Windows 上 triton 本就难装）：
#   - paged_attention_triton.py 缺 triton 时 **真有 torch 回退**（占位函数直接委派
#     paged_attention_torch，bit-identical），且与 naive dense attention 数值对齐
#     （max abs diff 0.0）→ 当作普通可跑 demo（v0:false 直跑）。
#   - vllm_compare.py 需装 vllm(Linux+CUDA) + 下载 Qwen2.5-0.5B(~1GB) 才能跑 →
#     tier: skip。已修其缺 vllm 时的「假成功」(原 print+return []→exit0)→改 fail-fast。
# 无 argparse 的脚本 → v0: false（跳过 --help 探针，直接 smoke 直跑）。
# scheduling_policies.py 无 __main__（纯库，被 test_scheduling.py 覆盖）→ 不入 runbook，归 V2。
# 测试套件（4 文件）归 V2（--tests）；verify_env 归 --env。
module: inference-engine-core
commands:
  - id: attention-naive
    desc: "L10 naive PyTorch attention 基线（flash-attn/flashinfer 缺时回退）"
    cmd: "python learning/inference-engine-core/src/attention_naive.py"
    expect: "exit 0；打印 out shape + norm + flash_attn/flashinfer 探测"
    tier: V1
    v0: false
    gpu: false

  - id: naive-kv
    desc: "L02 naive 静态 KV cache 碎片度量"
    cmd: "python learning/inference-engine-core/src/naive_kv.py"
    expect: "exit 0；打印 ~70% KV 槽位浪费"
    tier: V1
    v0: false
    gpu: false

  - id: paged-kv
    desc: "L03 PagedAttention KV（block table + 物理块池，vLLM SOSP'23 核）"
    cmd: "python learning/inference-engine-core/src/paged_kv.py"
    expect: "exit 0；打印 free blocks + utilization(~83%) + per-req blocks"
    tier: V1
    v0: false
    gpu: false

  - id: paged-attention-triton
    desc: "L04 paged attention kernel；缺 triton 时 torch 回退（与 naive 数值一致）"
    cmd: "python learning/inference-engine-core/src/paged_attention_triton.py"
    expect: "exit 0；打印 output shape + norm（torch 回退路径）"
    tier: V1
    v0: false
    gpu: false

  - id: chunked-prefill
    desc: "L06 chunked prefill 调度（decode 与切片 prefill 混批，Sarathi）"
    cmd: "python learning/inference-engine-core/src/chunked_prefill.py"
    expect: "exit 0；逐 iter 打印 decode/prefill_chunks 预算切分"
    tier: V1
    v0: false
    gpu: false

  - id: continuous-batching
    desc: "L05 continuous batching 调度骨架（Orca OSDI'22 迭代级调度）"
    cmd: "python learning/inference-engine-core/src/continuous_batching.py"
    expect: "exit 0；打印 reqs/in/out/tps 汇总"
    tier: V1
    v0: false
    gpu: false

  - id: prefix-cache
    desc: "L07 prefix caching（block-hash + LRU，共享系统提示前缀）"
    cmd: "python learning/inference-engine-core/src/prefix_cache.py"
    expect: "exit 0；打印 per-q 命中 token + hit_rate(~0.9)"
    tier: V1
    v0: false
    gpu: false

  - id: sampling
    desc: "L11 批量采样（temperature/top-k/top-p/min-p/penalty，对齐 vLLM Sampler）"
    cmd: "python learning/inference-engine-core/src/sampling.py"
    expect: "exit 0；打印采样 token id"
    tier: V1
    v0: false
    gpu: false

  - id: mini-vllm
    desc: "L13 Capstone：mini-vLLM 全 5 case（paged KV + 连续批 + 采样 + 前缀缓存）"
    cmd: "python learning/inference-engine-core/src/mini_vllm.py --case {case}"
    full:  { case: 0 }     # 0 = 跑全部 5 case
    smoke: { case: 0 }     # 5 case 纯 CPU stub forward，<1s，无需缩小
    expect: "exit 0；逐 case 打印 JSON（tokens_out + throughput）"
    tier: V1
    v0: true               # 有 argparse，--help 探针可探
    gpu: false

  - id: vllm-compare
    desc: "L13 用真实 vllm 跑同 5 case 对照（需 vllm + Qwen2.5-0.5B 权重）"
    cmd: "python learning/inference-engine-core/src/vllm_compare.py --model {model}"
    full:  { model: "Qwen/Qwen2.5-0.5B" }
    smoke: { model: "Qwen/Qwen2.5-0.5B" }   # 仅供模板渲染；tier:skip 不真跑 smoke
    # tier: skip —— 本机无 vllm（Windows 难装）且需下载 ~1GB 权重；缺 vllm 已 fail-fast
    # （非假成功）。装 vllm 的 Linux+CUDA 机上可直接跑 full 形态对照 mini_vllm。
    tier: skip
    v0: true               # argparse --help 仍 exit 0，可静态验证入口存在
    gpu: true
