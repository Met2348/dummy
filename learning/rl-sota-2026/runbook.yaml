# rl-sota-2026 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules rl-sota-2026
# 文档入口（README §入口 + lectures 实战入口）：5 个手写 minimal 直跑 demo。
# 这些脚本无 argparse → v0: false（跳过 --help 探针，直接 smoke 直跑到完成）。
# 4 件套独立单测 + VAPO/Dr.GRPO/GenRM 测试归 V2（--tests），不在此重复。verify_env 用 --env。
# 注：src/ 全手写 minimal，零高危 import（无 verl/vllm/ray/trl/flash/deepspeed）——
#     "verl 完整训练"(dapo_verl.py / dapo_full.yaml) 仅存在于讲义，本地无该文件，不入 runbook。
module: rl-sota-2026
commands:
  - id: dapo-minimal
    desc: "DAPO 4 件套独立实现 + smoke 演示（Clip-Higher/Dynamic Sampling/Token-level PG/Overlong Shaping）"
    cmd: "python learning/rl-sota-2026/src/dapo_minimal.py"
    expect: "exit 0；打印 4 件套各自数值：asymmetric vs symmetric clip loss、group useful 真值表、token-vs-response loss、overlong shaped reward"
    tier: V1
    v0: false
    gpu: false
  - id: dr-grpo
    desc: "Dr.GRPO — 用 MAD 替代 std 归一化 + 长度惩罚，对照普通 GRPO std-normalize"
    cmd: "python learning/rl-sota-2026/src/dr_grpo.py"
    expect: "exit 0；打印 GRPO(std) vs Dr.GRPO(MAD) advantage，outlier 存在时数值不同"
    tier: V1
    v0: false
    gpu: false
  - id: vapo-minimal
    desc: "VAPO — Length-Adaptive GAE（λ 随 response 长度动态调整）"
    cmd: "python learning/rl-sota-2026/src/vapo_minimal.py"
    expect: "exit 0；打印随长度单调上升的 adaptive lambda + advantage"
    tier: V1
    v0: false
    gpu: false
  - id: genrm
    desc: "GenRM — 生成式 RM（LLM 出 CoT critique 再打分），mock judge 对照 scalar RM"
    cmd: "python learning/rl-sota-2026/src/genrm.py"
    expect: "exit 0；打印 scalar vs genrm 分数对照表"
    tier: V1
    v0: false
    gpu: false
  - id: capstone-dapo-ablation
    desc: "Capstone — DAPO 4 件套消融实验（6 配置：baseline + 逐个加 trick + 全开），mock 增量训练"
    cmd: "python learning/rl-sota-2026/src/capstone_dapo_ablation.py"
    expect: "exit 0；打印 5+ 配置的 acc/delta/len/aha% 网格 + 组件 smoke；mock（诚实标注），真实训练需 5090"
    tier: V1
    v0: false
    gpu: false
