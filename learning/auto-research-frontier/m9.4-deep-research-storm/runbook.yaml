# m9.4 Deep Research / 文献综述 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules auto-research-frontier/m9.4-deep-research-storm
# 纯 CPU、确定性、只用标准库。run.py 有 argparse（v0:true 探 --help）。
# 测试套件 src/tests/test_faithfulness.py 归 V2，用 --tests 验证。
module: auto-research-frontier/m9.4-deep-research-storm
commands:
  - id: mini-storm-faithfulness
    desc: "多视角综述 + 逐句忠实度核查：naive 存在性检查全过，忠实度检查揪出不忠实句"
    cmd: 'python learning/auto-research-frontier/m9.4-deep-research-storm/src/run.py --topic "{topic}"'
    full:  { topic: "how AI research agents do retrieval and avoid pitfalls" }
    smoke: { topic: "retrieval pitfalls autonomous agents" }
    expect: "exit 0；打印综述逐句 [OK]/[!!]；存在性 N/N 通过，忠实度抓出 >=2 句不忠实"
    tier: V1
    v0: true
    gpu: false
