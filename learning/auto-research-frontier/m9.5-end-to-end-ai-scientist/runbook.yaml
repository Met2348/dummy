# m9.5 端到端 AI Scientist 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules auto-research-frontier/m9.5-end-to-end-ai-scientist
# 注：本模块嵌套在 auto-research-frontier/ 下，--modules 要传完整相对路径（harness 用 Path 解析斜杠）。
# run.py 有 argparse（v0:true 探 --help）；device 默认 auto→cuda（3080Ti 真训练，gpu:true）。
# 测试套件（src/tests/test_pipeline.py，7 个诚实性测试）归 V2，用 --tests 验证。
module: auto-research-frontier/m9.5-end-to-end-ai-scientist
commands:
  - id: mini-ai-scientist-one
    desc: "单 idea 端到端：add-depth（真训 baseline vs treatment → 报告 → 评审）"
    cmd: "python learning/auto-research-frontier/m9.5-end-to-end-ai-scientist/src/run.py --idea {idea} --seeds {seeds} --epochs {epochs} --n-samples {n}"
    full:  { idea: add-depth, seeds: 5, epochs: 200, n: 600 }
    smoke: { idea: add-depth, seeds: 3, epochs: 40, n: 300 }
    expect: "exit 0；打印 verdict=supported（加隐藏层在 moons 上真涨点）"
    tier: V1
    v0: true
    gpu: true

  - id: mini-ai-scientist-all
    desc: "全 idea 诚实光谱：supported/refuted/inconclusive 都出现 + 两个批判演示"
    cmd: "python learning/auto-research-frontier/m9.5-end-to-end-ai-scientist/src/run.py --idea all --seeds {seeds} --epochs {epochs} --n-samples {n}"
    full:  { seeds: 5, epochs: 200, n: 600 }
    smoke: { seeds: 2, epochs: 30, n: 240 }
    expect: "exit 0；crank-lr 判 refuted；打印 ideation-execution gap 与 grading-own-homework"
    tier: V1
    v0: false
    gpu: true
