# m9.8 批判·安全·科研诚信（毕业 capstone）文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules auto-research-frontier/m9.8-redteam-and-integrity
# 纯 CPU、确定性（numpy 真训练 + sha256 指纹）。run.py 有 argparse（v0:true 探 --help）。
# 测试套件 src/tests/test_redteam.py 归 V2，用 --tests 验证。
module: auto-research-frontier/m9.8-redteam-and-integrity
commands:
  - id: redteam-all
    desc: "诚实基线 + 4 种造假：天真评审全被骗，诚信守卫逐一戳穿（毕业判定）"
    cmd: "python learning/auto-research-frontier/m9.8-redteam-and-integrity/src/run.py"
    full:  {}
    smoke: {}
    expect: "exit 0；诚实过全守卫，4 种攻击各被对应守卫抓住，打印毕业'通过'"
    tier: V1
    v0: true
    gpu: false

  - id: redteam-one
    desc: "单看一种攻击的守卫细节：硬编码指标被独立复算戳穿"
    cmd: "python learning/auto-research-frontier/m9.8-redteam-and-integrity/src/run.py --attack {attack}"
    full:  { attack: hardcode-metric }
    smoke: { attack: hardcode-metric }
    expect: "exit 0；metric 守卫报 acc 不符、独立评审报自评虚高"
    tier: V1
    v0: false
    gpu: false
