# m9.7 自我改进 / 自动算法发现 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules auto-research-frontier/m9.7-self-improvement-evolution
# 纯 CPU、确定性（变异是枚举，无随机数）。run.py 有 argparse（v0:true 探 --help）。
# 测试套件 src/tests/test_evolve.py 归 V2，用 --tests 验证。
module: auto-research-frontier/m9.7-self-improvement-evolution
commands:
  - id: self-improve-reward-hacking
    desc: "自我改进进化：优化代理 naive 把它背满但 holdout 不动(reward hacking)；优化真目标才真涨"
    cmd: "python learning/auto-research-frontier/m9.7-self-improvement-evolution/src/run.py --gens {gens}"
    full:  { gens: 14 }
    smoke: { gens: 8 }
    expect: "exit 0；naive 进化 holdout 停在 0.500、memo 增长 threshold 不变；holdout 进化 holdout→1.0"
    tier: V1
    v0: true
    gpu: false
