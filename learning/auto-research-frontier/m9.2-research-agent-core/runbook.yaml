# m9.2 研究 Agent 内核 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules auto-research-frontier/m9.2-research-agent-core
# 纯 CPU、确定性、只用标准库。run.py 有 argparse（v0:true 探 --help）。
# 测试套件 src/tests/test_agent.py 归 V2，用 --tests 验证。
module: auto-research-frontier/m9.2-research-agent-core
commands:
  - id: research-agent-compare
    desc: "ReAct 闭环并排对比：有 critic 清掉幻觉引用 vs 无 critic 残留"
    cmd: 'python learning/auto-research-frontier/m9.2-research-agent-core/src/run.py --question "{q}"'
    full:  { q: "autonomous research agent for ideation and evaluation" }
    smoke: { q: "research agent ideation evaluation" }
    expect: "exit 0；无 critic 残留 1 处幻觉引用、有 critic 残留 0；打印内核零件教学点"
    tier: V1
    v0: true
    gpu: false

  - id: research-agent-nocritic
    desc: "只跑裸 ReAct（无 critic），看幻觉引用怎么留在最终计划里"
    cmd: "python learning/auto-research-frontier/m9.2-research-agent-core/src/run.py --no-critic"
    full:  {}
    smoke: {}
    expect: "exit 0；打印残留幻觉引用 >=1"
    tier: V1
    v0: false
    gpu: false
