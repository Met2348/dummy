# m9.1 自主性阶梯与全景 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules auto-research-frontier/m9.1-autonomy-ladder-and-map
# 纯 CPU、确定性、无重型依赖（只用标准库）。run.py 有 argparse（v0:true 探 --help）。
# 测试套件 src/tests/test_taxonomy.py 归 V2，用 --tests 验证。
module: auto-research-frontier/m9.1-autonomy-ladder-and-map
commands:
  - id: autonomy-map
    desc: "全景地图：把系统目录按证据归 Tool/Analyst/Scientist + 生命周期覆盖 + 领域阅读法洞见"
    cmd: "python learning/auto-research-frontier/m9.1-autonomy-ladder-and-map/src/run.py --show {show}"
    full:  { show: all }
    smoke: { show: all }
    expect: "exit 0；打印三级阶梯地图 + 逐系统 claimed→evidenced 对照 + '自称越自主结果越自评'的洞见"
    tier: V1
    v0: true
    gpu: false

  - id: autonomy-classify-one
    desc: "单系统归类与理由：看 AI Scientist v2 的 claimed vs evidenced"
    # 注：system 值带空格，必须在模板里给占位符包引号（harness 用 shlex(posix=False) 解析）。
    cmd: 'python learning/auto-research-frontier/m9.1-autonomy-ladder-and-map/src/run.py --system "{system}"'
    full:  { system: "AI Scientist v2" }
    smoke: { system: "AI Scientist v2" }
    expect: "exit 0；打印 claimed=scientist、evidenced=scientist、仅自评 等理由"
    tier: V1
    v0: false
    gpu: false
