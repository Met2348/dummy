# m9.3 创意与假设生成 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules auto-research-frontier/m9.3-ideation-and-tournament
# 纯 CPU、确定性（numpy 逻辑回归真训练）。run.py 有 argparse（v0:true 探 --help）。
# 测试套件 src/tests/test_tournament.py 归 V2，用 --tests 验证。
module: auto-research-frontier/m9.3-ideation-and-tournament
commands:
  - id: idea-tournament
    desc: "评委锦标赛 vs 真实执行：评委冠军恰是执行垫底 + 评委偏爱自家点子"
    cmd: "python learning/auto-research-frontier/m9.3-ideation-and-tournament/src/run.py --passes {passes}"
    full:  { passes: 8 }
    smoke: { passes: 4 }
    expect: "exit 0；打印两份榜，评委冠军真实可行性排后半段；self 点子 Elo 更高但 acc 更低"
    tier: V1
    v0: true
    gpu: false

  - id: idea-tournament-nobias
    desc: "关掉自偏好：novelty 偏差仍把低可行性点子顶上去"
    cmd: "python learning/auto-research-frontier/m9.3-ideation-and-tournament/src/run.py --no-self-bias"
    full:  {}
    smoke: {}
    expect: "exit 0；self_bias=OFF，评委冠军仍是高 novelty 低 feasibility 的点子"
    tier: V1
    v0: false
    gpu: false
