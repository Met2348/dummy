# small-model-graduation 文档入口命令清单（runbook）
# 验证：.venv/Scripts/python.exe scripts/eric_3080ti_env_audit.py --runbook --modules small-model-graduation \
#   --json-out docs/local-env/ERIC-3080Ti-runbook-results.json --md-out docs/local-env/ERIC-3080Ti-runbook-matrix.md
#
# 本专题 = M3「造大模型」系列毕业 capstone（TinyStories 风格小模型五部曲 A→E + 评测/报告）。
#   流水线：vanilla GPT-2(ckpt A) → 改数据(B) → Phi-tiny 架构(C) → YaRN 长 ctx(D) → curriculum(E)
#           → bench matrix(6 metric × 5 ckpt) → 可视化/spider → 5-ckpt 生成对照 → final graduation 报告。
#
# argparse 盘点（grep -nE "add_argument|ArgumentParser|__main__" src/*.py）：
#   - train_variant.py     → argparse(--variant 必填 + --train + 本次新增 --max_step/--seq_len/--micro_batch/--grad_accum) → v0: true。
#   - graduation_capstone.py → argparse(--report_dir + --train) → v0: true。
#   - 其余 5 个（common/vanilla_gpt2/bench_matrix/generations_compare/visualize/tinystories_original_minimal）
#       只有 __main__ 直跑、零 add_argument → v0: false（跳过 --help 探针，直接 smoke 直跑）。
#   harness 通过 PYTHONPATH 注入 learning/small-model-graduation/src，故 capstone/train_variant 内裸 import 在 repo-root cwd 下能解析。
#   train_variant 的 phi_tiny(C/D/E) 走 sys.path.insert 到 ../../pretraining-recipe/src（仅 --train C/D/E 才需，smoke 只跑 A 不依赖）。
#
# 数据/离线（catalog #2 对照）：**本模块 src 无任何 load_dataset / HF 下载**。
#   "TinyStories" 仅出现在 docstring 与 data_desc 文案；真训用 mock_loader(random ints) 教学占位 → smoke 不依赖网络。
#
# 本次修的真实 bug（见报告 CODE_CHANGES）：
#   1) graduation_capstone.py import 漂移：`from visualize import make_loss_curve_data` 实际该符号在 bench_matrix.py
#      → ImportError，连 --help/dry-run 都崩（README 文档命令 `python src/graduation_capstone.py` 直接失败）。改从 bench_matrix import。
#   2) train_variant.py 缺 lecture 已文档化的 flag：lectures 02-06 写 `--variant A --max_step 3000`（及 --seq_len 等），
#      但脚本只认 --variant/--train → `unrecognized arguments` 崩。补 --max_step/--seq_len/--micro_batch/--grad_accum 覆盖项
#      （default=None→回退 variant cfg），使文档命令真能跑；并给 smoke 极小预算走真训路径。
#      附带：max_step<100 的 smoke 不写 ckpt_*.pt（仓库零污染，对齐 pretraining-recipe 模板）。
#
# 关键坑注记（catalog 对照）：
#   - graduation-capstone smoke = **dry-run**（默认不 --train）：真生成 5 个报告产物(benchmarks.csv/report.md/
#     generations.md/ablation.json)，数据用 EXPECTED 参考值（stdout 明示 "using EXPECTED for dry-run"，非伪造训练结果，
#     非 catalog #4/#7 假成功）；真训(--train, 5090 ~24h, 5 ckpt)非本地 smoke 目标。产物写 /tmp/grad_smoke 避免污染 repo。
#   - train-variant-a smoke = **真训 2 step**（--train，cuda bf16 真前向/反向/clip/AdamW step），~12s，不落 ckpt。
#   - 秒级 PASS 合法：vanilla_gpt2(真建 124.4M+fwd [2,64,50257])、bench_matrix/generations/visualize(真写表/模板)、
#     tinystories_original_minimal(_self_test 真 assert child_vocab/rouge/param 单调)、common(真打印 5 variant 表)。
#
# 测试套件 src/tests/test_graduation.py 归 V2（--tests，硬断言 forward shape/param 量/loss 单调/ablation/rouge 检测复制
#   ——非空守卫，catalog #7 清白）；environment/verify_env.py 归 --env。无 official/ 子模块(.gitmodules 无本模块条目)。
module: small-model-graduation
commands:
  - id: vanilla-gpt2
    desc: "Vanilla GPT-2 124M baseline (ckpt A)：tied embed + causal MHA，真建模 + 前向出 shape"
    cmd: "python learning/small-model-graduation/src/vanilla_gpt2.py"
    expect: "exit 0；打印 total 124.4M / excl-embed 85.8M / fwd [2,64,50257]"
    tier: V1
    v0: false
    gpu: false
  - id: tinystories-minimal
    desc: "TinyStories 论文最小机制：child-vocab 占比 / Rouge-k 复制检测 / GPT-Eval rubric / 宽深参数估算（self-test 真 assert）"
    cmd: "python learning/small-model-graduation/src/tinystories_original_minimal.py"
    expect: "exit 0；打印 'TinyStories original minimal checks passed'"
    tier: V1
    v0: false
    gpu: false
  - id: bench-matrix
    desc: "Bench matrix：6 metric × 5 ckpt 表 + ablation 五部曲贡献分解（写 csv/report + 打印 ablation json）"
    cmd: "python learning/small-model-graduation/src/bench_matrix.py"
    expect: "exit 0；写 CSV/report + 打印 ablation breakdown 真数"
    tier: V1
    v0: false
    gpu: false
  - id: generations-compare
    desc: "5 ckpt 同 prompt 生成对照：mock 5×5 输出池 + top-p 生成模板"
    cmd: "python learning/small-model-graduation/src/generations_compare.py"
    expect: "exit 0；打印 A/B/C/E mock 生成 + generate 模板"
    tier: V1
    v0: false
    gpu: false
  - id: visualize
    desc: "可视化：文本版 loss curve + spider chart + matplotlib 脚本生成器"
    cmd: "python learning/small-model-graduation/src/visualize.py"
    expect: "exit 0；打印 ASCII loss 曲线 + spider 表 + mpl 脚本片段"
    tier: V1
    v0: false
    gpu: false
  - id: common
    desc: "毕业 capstone 公共工具（L01）：5 个 ckpt variant 描述表"
    cmd: "python learning/small-model-graduation/src/common.py"
    expect: "exit 0；打印 A-E 五 variant 描述"
    tier: V1
    v0: false
    gpu: false
  - id: train-variant
    desc: "五部曲单 ckpt 训练统一入口。full=ckpt A 真训 3000 step（GPT-2 124M）；smoke=2 step 真训路径（cuda bf16，不落 ckpt）"
    cmd: "python learning/small-model-graduation/src/train_variant.py --variant A --max_step {step} --seq_len {sl} --micro_batch {mb} --grad_accum {ga} --train"
    full:  { step: 3000, sl: 512, mb: 32, ga: 4 }
    smoke: { step: 2, sl: 64, mb: 2, ga: 2 }
    expect: "exit 0；device=cuda + 真前向/反向；smoke 2 step (max_step<100) 不写 ckpt_A.pt"
    tier: V1
    v0: true
    gpu: true
  - id: graduation-capstone
    desc: "Final graduation ⭐：5 ckpt 全流程 + 报告生成。full=--train 5 ckpt 真训(5090 ~24h)；smoke=dry-run 生成 5 报告产物"
    cmd: "python learning/small-model-graduation/src/graduation_capstone.py --report_dir {rd}"
    full:  { rd: report }
    smoke: { rd: /tmp/grad_smoke }
    expect: "exit 0；写 benchmarks.csv/report.md/generations.md/ablation.json（dry-run 用 EXPECTED 参考值，非伪造）"
    tier: V1
    v0: true
    gpu: false
