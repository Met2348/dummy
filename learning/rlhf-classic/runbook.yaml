# rlhf-classic 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules rlhf-classic \
#         --json-out docs/local-env/ERIC-3080Ti-runbook-results.json \
#         --md-out docs/local-env/ERIC-3080Ti-runbook-matrix.md
# cmd = README/lecture「入口」原文形态（repo-root 相对）。smoke = 验证器实际跑的最小预算。
# 注：pytest 测试套件归 V2（--tests）；verify_env 归 --env；均不在此重复。
#
# 重要：本模块**无 trl 依赖**——三段管线（SFT/RM/PPO）全是手写实现（sft_minimal /
# rm_minimal / ppo_llm_minimal），不踩 trl 1.5.x 经典 PPOConfig/PPOTrainer 漂移坑。
# lecture 里提到的 sft_trl.py / ppo_llm_trl.py 是"三轨实现"教学示意，文件本身未创建（见
# README「待继续」），不是可运行入口，故不收录。
module: rlhf-classic
commands:
  - id: rm-train
    desc: "Stage 2 Reward Model：手写 Bradley-Terry RM 在 Anthropic-HH 上训练"
    cmd: "python learning/rlhf-classic/src/rm_minimal.py --n-train {ntrain} --n-eval {neval} --batch {batch} --epochs {epochs} --max-length {maxlen}"
    full:  { ntrain: 1000, neval: 200, batch: 4, epochs: 1, maxlen: 512 }
    smoke: { ntrain: 16, neval: 8, batch: 4, epochs: 1, maxlen: 128 }
    expect: "exit 0；打印每 epoch train loss + acc + eval acc（数据集 Anthropic/hh-rlhf 命名空间 id 可加载）"
    tier: V1
    v0: true
    gpu: true

  - id: sft-demo
    desc: "Stage 1 SFT：GPT-2 + prompt-mask NLL，3 step 真实训练演示"
    cmd: "python learning/rlhf-classic/src/sft_minimal.py"
    expect: "exit 0；打印 input_ids shape + label mask + 3 步 loss（下降）"
    tier: V1
    v0: false
    gpu: false

  - id: ppo-llm-smoke
    desc: "Stage 3 PPO：手写 4-model（actor/critic/ref/rm）token-level PPO smoke（TinyLM 数值）"
    cmd: "python learning/rlhf-classic/src/ppo_llm_minimal.py"
    expect: "exit 0；打印 3 步 pi_loss/v_loss/entropy/total"
    tier: V1
    v0: false
    gpu: false

  - id: reward-hacking
    desc: "Reward Hacking 演示：长度退化 RM → reward 涨 + length 漂移 → 检测命中"
    cmd: "python learning/rlhf-classic/src/reward_hacking_demo.py"
    expect: "exit 0；诊断 detected=True（reward 涨但 length 漂移）"
    tier: V1
    v0: false
    gpu: false

  - id: cai-demo
    desc: "Constitutional AI / RLAIF：critique-revise + LLM-as-judge 偏好对（mock LLM）"
    cmd: "python learning/rlhf-classic/src/cai_minimal.py"
    expect: "exit 0；打印 revised 输出 + preference pair"
    tier: V1
    v0: false
    gpu: false

  - id: capstone-tldr
    desc: "Capstone：TL;DR RLHF 三段管线 demo（SFT 20 + RM 20 + PPO-mock 10 step，CPU 可跑）"
    cmd: "python learning/rlhf-classic/src/capstone_tldr_rlhf.py"
    expect: "exit 0；三段各打印 loss/reward，结尾「三段管线全跑通」"
    tier: V1
    v0: false
    gpu: false
