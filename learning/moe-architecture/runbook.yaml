# moe-architecture 文档入口命令清单（runbook）
# 验证：.venv/Scripts/python.exe scripts/eric_3080ti_env_audit.py --runbook --modules moe-architecture
# 文档入口（README「src/」+「验证命令」）：13 个 from-scratch MoE 直跑 demo。
# 全部脚本均无 argparse（只有 __main__ 直跑，无 add_argument/ArgumentParser）→ v0: false（跳过 --help 探针，直接 smoke 直跑）。
#   capstone_train_mini_moe.py 也无 argparse：__main__ 硬编码 steps=100（main(steps) 形参不暴露到 CLI）→ 无 smoke 参数，直跑 100 step（CPU ~6s）。
# 4 个一致性测试（src/tests/）归 V2（--tests）；environment/verify_env.py 归 --env。
# 无 official/ 子模块（.gitmodules 无 moe 条目）。megablocks 仅 L00 lecture 提及，src 不依赖（grouped_gemm 用纯 torch.block_diag）。
# 关键坑注记：
#   - 全部为纯数值/结构 self-test，CPU 秒级 PASS 是正常的（真有路由 forward + 打印真实张量/load 分布/参数量/loss，非 no-op）。
#   - mixtral/phi/qwen3_moe_load：**纯 config dict 打印**，不下载 HF 权重、零网络（非「假成功」——本就无外部依赖）。
#   - capstone_train_mini_moe：真训练循环（AdamW+grad clip+cross_entropy），loss 60.6→12.2 真下降（非假成功）。
#   - grouped_gemm_demo：CPU 上 block_diag fused 实测比 naive 慢（speedup<1×），打印真实测得数（教学对照，非 bug）；GPU 大尺寸才显优势。
#   - 全部 CPU 默认（无 .cuda() 默认路径）→ gpu: false。
module: moe-architecture
commands:
  - id: moe-layer-naive
    desc: "Shazeer 2017 教学版 MoE（top-2 gating + aux load-balance loss）forward self-test"
    cmd: "python learning/moe-architecture/src/moe_layer_naive.py"
    tier: V1
    v0: false
    gpu: false
  - id: gshard-router
    desc: "GShard router（top-2 + capacity factor 丢弃 + aux loss）self-test"
    cmd: "python learning/moe-architecture/src/gshard_router.py"
    tier: V1
    v0: false
    gpu: false
  - id: switch-router
    desc: "Switch Transformer router（top-1 极简 + expert 利用率）self-test"
    cmd: "python learning/moe-architecture/src/switch_router.py"
    tier: V1
    v0: false
    gpu: false
  - id: expert-choice
    desc: "Expert Choice 反向路由（Zhou 2022，每 expert 选 top-cap token）self-test"
    cmd: "python learning/moe-architecture/src/expert_choice.py"
    tier: V1
    v0: false
    gpu: false
  - id: deepseekmoe-layer
    desc: "DeepSeekMoE 细粒度 + 共享专家（4 routed + 1 shared，top-2）forward self-test"
    cmd: "python learning/moe-architecture/src/deepseekmoe_layer.py"
    tier: V1
    v0: false
    gpu: false
  - id: aux-loss-free
    desc: "Aux-Loss-Free 路由（DeepSeek-V3，bias buffer 控负载）100-step 平衡 demo"
    cmd: "python learning/moe-architecture/src/aux_loss_free.py"
    tier: V1
    v0: false
    gpu: false
  - id: router-z-loss
    desc: "Router z-loss（ST-MoE 2022）+ crash demo（有/无 aux 路由坍缩对照，200 step）"
    cmd: "python learning/moe-architecture/src/router_z_loss.py"
    tier: V1
    v0: false
    gpu: false
  - id: grouped-gemm
    desc: "Grouped GEMM 教学版（megablocks 风格 naive vs block_diag fused 实测对照）"
    cmd: "python learning/moe-architecture/src/grouped_gemm_demo.py"
    tier: V1
    v0: false
    gpu: false
  - id: mixtral-load
    desc: "Mixtral-8x7B / 8x22B 架构配置打印（纯 config，不下载权重）"
    cmd: "python learning/moe-architecture/src/mixtral_load.py"
    tier: V1
    v0: false
    gpu: false
  - id: phi-moe-load
    desc: "Phi-3.5-MoE 架构配置打印（纯 config，不下载权重）"
    cmd: "python learning/moe-architecture/src/phi_moe_load.py"
    tier: V1
    v0: false
    gpu: false
  - id: qwen3-moe-load
    desc: "Qwen3-A3B / 235B 架构配置打印（纯 config，不下载权重）"
    cmd: "python learning/moe-architecture/src/qwen3_moe_load.py"
    tier: V1
    v0: false
    gpu: false
  - id: mini-moe
    desc: "Mini-MoE 集成（GPT-mini 风格 base + 4-routed/1-shared Aux-Free MoE）forward self-test"
    cmd: "python learning/moe-architecture/src/mini_moe.py"
    tier: V1
    v0: false
    gpu: false
  - id: capstone-train
    desc: "Capstone mini-MoE 训练（AdamW+grad clip，mock data，loss 真下降，100 step CPU ~6s）"
    cmd: "python learning/moe-architecture/src/capstone_train_mini_moe.py"
    tier: V1
    v0: false
    gpu: false
