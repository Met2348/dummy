# scaling-infra 文档入口命令清单（runbook）
# 验证：.venv/Scripts/python.exe scripts/eric_3080ti_env_audit.py --runbook --modules scaling-infra \
#   --json-out docs/local-env/ERIC-3080Ti-runbook-results.json --md-out docs/local-env/ERIC-3080Ti-runbook-matrix.md
#
# 文档入口（README L01-L14 代码列）：14 个 lecture demo + 1 个 capstone。本专题是「训练/推理基础设施」全景：
#   Scaling Laws → 并行(DP/TP/PP/ZeRO/FSDP/DeepSpeed/Megatron) → 推理(PagedAttention/vLLM/SGLang/spec/quant) → 混精/监控 → Capstone 训练估算器。
#
# 全部脚本均**无 argparse**（只有 __main__ 直跑，无 add_argument/ArgumentParser）→ v0: false（跳过 --help 探针，直接 smoke 直跑）。
#   验证：grep -nE "add_argument|ArgumentParser|__main__" learning/scaling-infra/src/*.py → 仅 __main__，零 argparse。
#   common.py 是纯公共工具（model_size_bytes/optimizer_state_bytes/kv_cache_bytes 等被其他脚本 import）→ 非 lecture 入口，不列。
#     (它带一个 __main__ self-test 打印 Llama-7B 显存账本，但定位是 helper；与 long-context common.py 同处理——不入 runbook。)
#
# harness 通过 PYTHONPATH 注入 learning/scaling-infra/src，因此 parallelism_demo.py 内 `from common import …` 裸 import
#   在 repo-root cwd 下也能解析（与 long-context/moe-architecture 同机制）。
#
# 全部 CPU、纯数值/结构 self-test，**无任何 .cuda()/torch.save/文件写出运行路径**（grep 命中的 cuda/ckpt.pt 全在打印的代码模板三引号字符串内，不执行）→ gpu: false，不污染 repo。
#
# 关键坑注记（catalog 对照）：
#   - 秒级 PASS 全部合法（catalog #4 fake-pass 已逐一排除）：
#       · scaling_laws / common / parallelism / deepspeed_config / monitoring / mixed_precision / quantization(显存表) / speculative
#         = 纯解析公式（Chinchilla 406.4·N^-0.34+410.7·D^-0.28+1.69、6ND FLOPs、ZeRO/TP 显存账本、MFU=6N·tok/s ÷ peak、
#           speculative accept = min(1, p_t/p_d) + speedup 曲线），CPU 微秒级算真数。
#         scaling_laws 实证：IsoFLOP 谷底在 ratio≈100 (loss=2.0052)，非 no-op；parallelism ZeRO-3 把 70B/64GPU 840→13.1GB。
#       · fsdp_demo / megatron_tp_demo / pipeline_parallel_demo = 真建 torch 模块（TinyModel 参数计数 / TP ColumnLinear@RowLinear 真 forward 出 shape / PP stage 真切层 + bubble (S-1)/(S+M-1) 公式），CPU。
#       · paged_attention_demo = 真跑 BlockManager 模拟（alloc/fork CoW refcount++/util），50 token→4 block、fork 不 alloc，全真计算。
#   - vllm_demo / sglang_demo / quantization_demo(模板段) = **诚实的"仅打印 setup 模板"**教学脚本（脚本 docstring 明示「真跑需 WSL2」）。
#     它们不 import vllm/sglang/auto_gptq 也不伪装跑通——只打印可复制的真实代码模板（catalog #4 是"捕获缺依赖伪装 exit 0"，此处无 import 无 try/except，非假成功）。
#     quantization_demo 另真算 8B 模型各 dtype 显存表（fp32 32GB→int4 4GB）。保留 tier V1（产出确定、有教学价值）。
#   - mixed_precision_demo 真取 torch.finfo 三精度范围（bf16 max 3.39e38 / fp16 max 6.55e4）+ loss-spike/grad-norm 守卫逻辑，CPU。
#
# 1 个一致性测试 src/tests/test_estimator.py 归 V2（--tests，硬断言 Chinchilla 比、estimator 可行性、ZeRO/TP 显存缩放——非空守卫，catalog #7 清白）；environment/verify_env.py 归 --env。
# 无 official/ 子模块（.gitmodules 无 scaling-infra 条目）。
module: scaling-infra
commands:
  - id: scaling-laws
    desc: "Scaling Laws：Chinchilla(1:20) vs Llama-3 over-train(1:200) 给定 C=1e23，IsoFLOP loss 表"
    cmd: "python learning/scaling-infra/src/scaling_laws.py"
    tier: V1
    v0: false
    gpu: false
  - id: parallelism-demo
    desc: "并行显存账本：DP/ZeRO-1/2/3/TP/PP 对 70B@64GPU 的 per-GPU 显存对比（ZeRO-3→13.1GB）"
    cmd: "python learning/scaling-infra/src/parallelism_demo.py"
    tier: V1
    v0: false
    gpu: false
  - id: fsdp-demo
    desc: "FSDP：真建 TinyModel 计参 + Llama-8B FSDP 各阶段 shard 显存估算 + setup 模板（多卡需 torchrun）"
    cmd: "python learning/scaling-infra/src/fsdp_demo.py"
    tier: V1
    v0: false
    gpu: false
  - id: deepspeed-config
    desc: "DeepSpeed config 生成器：ZeRO-3(+CPU offload) / Megatron-DS(TP8 PP8) JSON 配置"
    cmd: "python learning/scaling-infra/src/deepspeed_config.py"
    tier: V1
    v0: false
    gpu: false
  - id: megatron-tp-demo
    desc: "Megatron TP：ColumnLinear→act→RowLinear→all-reduce 单卡 mock，真 forward 出 shape + per-rank 参数对比"
    cmd: "python learning/scaling-infra/src/megatron_tp_demo.py"
    tier: V1
    v0: false
    gpu: false
  - id: pipeline-parallel-demo
    desc: "Pipeline Parallel：GPipe/1F1B vs Interleaved bubble 占比 (S-1)/(S+M-1) + 24 层切 8 stage"
    cmd: "python learning/scaling-infra/src/pipeline_parallel_demo.py"
    tier: V1
    v0: false
    gpu: false
  - id: paged-attention-demo
    desc: "PagedAttention：BlockManager block 管理 + 逻辑/物理映射 + beam-search CoW 共享(refcount) 模拟"
    cmd: "python learning/scaling-infra/src/paged_attention_demo.py"
    tier: V1
    v0: false
    gpu: false
  - id: vllm-demo
    desc: "vLLM 离线推理 + OpenAI server 启动模板（教学版仅打印 setup，真跑需 WSL2+vllm）"
    cmd: "python learning/scaling-infra/src/vllm_demo.py"
    tier: V1
    v0: false
    gpu: false
  - id: sglang-demo
    desc: "SGLang DSL 示例：chat / multi-branch fork / schema-JSON / launch_server 模板（仅打印）"
    cmd: "python learning/scaling-infra/src/sglang_demo.py"
    tier: V1
    v0: false
    gpu: false
  - id: speculative-decoding
    desc: "Speculative Decoding：accept=min(1,p_t/p_d) 拒绝采样模拟 + 理论 speedup 曲线 + Medusa head 估算"
    cmd: "python learning/scaling-infra/src/speculative_decoding.py"
    tier: V1
    v0: false
    gpu: false
  - id: quantization-demo
    desc: "推理量化：8B 模型 fp32/bf16/fp8/int8/int4 显存表 + GPTQ/AWQ/FP8/bnb 调用模板"
    cmd: "python learning/scaling-infra/src/quantization_demo.py"
    tier: V1
    v0: false
    gpu: false
  - id: mixed-precision-demo
    desc: "混精度：bf16 vs fp16 浮点范围 + AMP 训练模板 + loss-spike/grad-norm 健康守卫"
    cmd: "python learning/scaling-infra/src/mixed_precision_demo.py"
    tier: V1
    v0: false
    gpu: false
  - id: monitoring-demo
    desc: "监控：MFU=6N·tok/s÷peak 计算 + EMA loss tracker(spike 跳过) + GPU 健康检查 + FSDP ckpt 模板"
    cmd: "python learning/scaling-infra/src/monitoring_demo.py"
    tier: V1
    v0: false
    gpu: false
  - id: capstone-train-estimator
    desc: "Capstone：训练估算器，输入 model+GPU spec → 自动选并行策略(DP/ZeRO/FSDP/TP) + per-GPU 显存 + throughput + 时长 + 成本（1.5B/7B/70B/175B 四例）"
    cmd: "python learning/scaling-infra/src/capstone_train_estimator.py"
    tier: V1
    v0: false
    gpu: false
