# reasoning-r1 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules reasoning-r1
# cmd = README/讲义「入口」原文形态（repo-root 相对）。
#
# 本模块 5 个 src 脚本全部【无 argparse】→ 一律 v0:false（跳过 --help 探针），直接 smoke 直跑到完成。
# 全部是【手写数值 GRPO/RLOO/REINFORCE++ demo】，纯 CPU 秒级跑完，无模型加载/无数据下载 → gpu:false，无 smoke 预算。
# ⚠️ 讲义 13/14 给 track_a/track_b 标了 `--algo/--total_steps/--k/--base/--steps` 等 flag，但脚本无 argparse 不解析它们
#    （unknown argv 被静默忽略，不报错只用硬编码默认）。runbook 采用 README 真实可跑的【无 flag】形态。
# 注：pytest 测试套件归 V2（`--tests`），不在此重复。verify_env 用 `--env` 验证（且其 WSL2/verl/vllm 栈非本地必需）。
# submodule official/repos/DeepSeek-R1 不收录（别去跑/改它）。
module: reasoning-r1
commands:
  - id: grpo-minimal
    desc: "手写 GRPO 核心：group z-score advantage + clip surrogate + unbiased KL（GRPO 中心 demo）"
    cmd: "python learning/reasoning-r1/src/grpo_minimal.py"
    expect: "exit 0；打印 group advantage、每组 mean≈0、loss、stats（L_clip/L_kl/mean_ratio）"
    tier: V1
    v0: false
    gpu: false

  - id: rloo-minimal
    desc: "RLOO leave-one-out baseline，与 GRPO z-score advantage 对比"
    cmd: "python learning/reasoning-r1/src/rloo_minimal.py"
    expect: "exit 0；打印 RLOO vs GRPO advantage 两行 + 各自 mean/std"
    tier: V1
    v0: false
    gpu: false

  - id: reinforce-pp
    desc: "REINFORCE++（OpenRLHF）：去 critic + KL 加在 reward + 保留 PPO clip"
    cmd: "python learning/reasoning-r1/src/reinforce_pp.py"
    expect: "exit 0；打印 advantages（batch-baseline 居中）+ loss"
    tier: V1
    v0: false
    gpu: false

  - id: track-a-countdown
    desc: "Capstone Track A 教学轨：Countdown-3 + GRPO（mock 训练，演示 reward/advantage 计算）"
    cmd: "python learning/reasoning-r1/src/r1_zero_track_a.py"
    expect: "exit 0；打印 Countdown 题/prompt/reward + 200 步 mock GRPO 的 mean_R/adv_std 与早晚 Δ"
    tier: V1
    v0: false
    gpu: false

  - id: track-b-gsm8k
    desc: "Capstone Track B 挑战轨：Qwen-1.5B+4bit LoRA+GSM8K（伪代码 + aha 词频检测 demo）"
    cmd: "python learning/reasoning-r1/src/r1_zero_track_b.py"
    expect: "exit 0；打印 LoRA/4bit setup 伪代码 + GRPO config + mock aha 词频统计"
    tier: V1
    v0: false
    gpu: false
