# kernel-engineering 文档入口命令清单（runbook）
# 验证：python scripts/eric_3080ti_env_audit.py --runbook --modules kernel-engineering
# 文档入口：6 个纯 stdlib self-test 直跑 demo（无 argparse，v0:false，同 gpu-architecture/cuda-essentials 模式）。
# 测试套件归 V2（--tests）；本模块无 environment/verify_env.py，无需 --env。
# official/repos/flash-attention 是只读 git submodule 参考源码（真实 CUDA/C++），不在本 runbook 验证范围内，不要编译。
module: kernel-engineering
commands:
  - id: triton-style
    desc: "Triton 风格 autotune 决策（SMEM 预算估算 + 启发式打分选 tile 配置）"
    cmd: "python learning/kernel-engineering/src/triton_style.py"
    tier: V1
    v0: false
    gpu: false

  - id: cutlass-layout
    desc: "CUTLASS/CuTe 风格 layout（row/col-major 偏移公式 + coalescing 判定）"
    cmd: "python learning/kernel-engineering/src/cutlass_layout.py"
    tier: V1
    v0: false
    gpu: false

  - id: flash-attention
    desc: "FlashAttention-2 online softmax（分块递推）vs naive attention 数值对拍"
    cmd: "python learning/kernel-engineering/src/flash_attention.py"
    tier: V1
    v0: false
    gpu: false

  - id: fused-mlp
    desc: "GeLU+matmul kernel fusion 省 HBM 往返流量核算（unfused vs fused 数值对拍 + 字节数）"
    cmd: "python learning/kernel-engineering/src/fused_mlp.py"
    tier: V1
    v0: false
    gpu: false

  - id: rmsnorm-kernel
    desc: "RMSNorm + linear fusion 数值对拍（unfused vs fused 输出一致性）"
    cmd: "python learning/kernel-engineering/src/rmsnorm_kernel.py"
    tier: V1
    v0: false
    gpu: false

  - id: capstone-attn-speedup
    desc: "Capstone：5 个序列长度（512→131072）naive vs flash HBM 流量/speedup 曲线"
    cmd: "python learning/kernel-engineering/src/capstone_attn_speedup.py"
    tier: V1
    v0: false
    gpu: false
